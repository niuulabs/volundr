# ravn.example.yaml — Ravn application configuration reference
#
# Copy this file to one of the default search paths and edit to taste:
#   ~/.ravn/config.yaml  (recommended for personal installs)
#   ./ravn.yaml          (project-level override)
#   /etc/ravn/config.yaml (system-wide)
#
# Override with RAVN_CONFIG env var to point to a custom path.
#
# Environment variable override format (RAVN_ prefix, __ for nesting):
#   RAVN_ANTHROPIC__API_KEY=...
#   RAVN_LLM__MODEL=claude-opus-4-6
#   RAVN_THREAD__ENABLED=true
#
# Precedence (highest to lowest): env vars > yaml file > defaults

# ---------------------------------------------------------------------------
# Anthropic API
# ---------------------------------------------------------------------------
# anthropic:
#   api_key: ""          # prefer ANTHROPIC_API_KEY env var
#   base_url: "https://api.anthropic.com"

# ---------------------------------------------------------------------------
# LLM
# ---------------------------------------------------------------------------
# llm:
#   model: claude-sonnet-4-6
#   max_tokens: 8192
#   max_retries: 3
#   timeout: 120

# ---------------------------------------------------------------------------
# Thread enrichment queue (NIU-558)
#
# The thread enricher scores Mímir pages and queues them for wakefulness
# processing.  It is DISABLED by default (M1 safe).  M2 sets enabled: true.
#
# All weight fields contribute to the composite thread score:
#   score = (recency_weight * recency_signal)
#         + (mention_weight * mention_signal)
#         + (engagement_weight * engagement_signal)
#         + (peer_weight * peer_signal)
#         + (sub_thread_weight * sub_thread_signal)
#   score *= exp(-decay_rate_per_day * days_since_last_activity)
# ---------------------------------------------------------------------------
# thread:
#   enabled: false                      # flip to true in M2 deployment YAML
#   max_queue_size: 200
#   enricher_poll_interval_seconds: 300 # check Mímir every 5 minutes
#   enricher_llm_alias: fast            # use cheapest/fastest model alias
#   decay_rate_per_day: 0.05
#   recency_weight: 1.0
#   mention_weight: 0.3
#   engagement_weight: 0.5
#   peer_weight: 0.2
#   sub_thread_weight: 0.4
#   owner_id: null                      # defaults to this instance's own ID

# ---------------------------------------------------------------------------
# Recap trigger (NIU-569)
#
# Fires when the operator returns after an absence and surfaces a summary of
# what happened while they were away (closed threads, completed work).
#
# Two firing modes:
#   1. Return detection — interaction within return_detection_window_seconds
#      after a gap longer than absence_threshold_seconds.
#   2. Scheduled fallback — scheduled_recap_cron fires at a daily time.
# ---------------------------------------------------------------------------
# recap:
#   enabled: false                          # flip to true to activate
#   absence_threshold_seconds: 3600         # 1 h gap = "was away"
#   return_detection_window_seconds: 300    # within 5 min = "just returned"
#   scheduled_recap_cron: ""               # e.g. "0 7 * * *" for 07:00 daily
#   max_threads_in_recap: 10
#   persona: produce-recap
#   channel: ""                            # empty = TUI only
#   poll_interval_seconds: 60

# ---------------------------------------------------------------------------
# Trust gradient (NIU-571)
#
# Constrains what the Ravn can do autonomously during wakefulness.
# Each category maps to a trust level:
#   "free"     — action allowed without operator intervention
#   "approval" — tool forbidden; agent writes an approval request to approvals/
#   "never"    — tool unconditionally forbidden
# ---------------------------------------------------------------------------
# trust:
#   reading: free
#   writing_notes: free
#   sandbox_experiments: free
#   consulting_peers: free
#   drafting_tickets: free
#   producing_recaps: free
#   opening_tickets: approval
#   closing_tickets: approval
#   pushing_branches: approval
#   pushing_main: never
#   external_messages: approval
#   spending_beyond_cap: approval

# ---------------------------------------------------------------------------
# Memory
# ---------------------------------------------------------------------------
# memory:
#   backend: sqlite

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
# logging:
#   level: info
