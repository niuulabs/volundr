# Ravn mesh node 2 (reviewer) — local dev config (auto-generated by ravn-mesh.sh)

mesh:
  enabled: true
  adapter: nng
  own_peer_id: ravn-mesh-2
  nng:
    pub_sub_address: "ipc:///tmp/ravn-mesh/node-2.ipc"
    req_rep_address: "ipc:///tmp/ravn-mesh/node-2-rep.ipc"

llm:
  model: Qwen/Qwen3-Coder-30B-A3B-Instruct
  max_tokens: 8192
  timeout: 300.0
  provider:
    adapter: ravn.adapters.llm.openai.OpenAICompatibleAdapter
    kwargs:
      base_url: "https://vllm.valaskjalf.asgard.niuu.world"
      api_key: ""
      system_prefix: "You are Ravn, an autonomous agent."

discovery:
  enabled: true
  adapter: mdns
  mdns:
    handshake_port: 7491

cascade:
  enabled: true

initiative:
  enabled: true
  max_concurrent_tasks: 3
  queue_journal_path: "/tmp/ravn-mesh/ravn-mesh-2-queue.json"

memory:
  backend: sqlite
  sqlite:
    path: "/tmp/ravn-mesh/ravn-mesh-2.db"

mimir:
  enabled: true
  path: ~/.ravn/mimir
  instances:
    - name: local
      role: local
      path: ~/.ravn/mimir
      read_priority: 0
    - name: shared
      role: shared
      url: "https://volundr.valhalla.asgard.niuu.world"
      read_priority: 1

logging:
  level: DEBUG
