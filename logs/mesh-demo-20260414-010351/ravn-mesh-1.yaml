# Ravn mesh node 1 (coder) — local dev config (auto-generated by ravn-mesh.sh)

mesh:
  enabled: true
  adapter: nng
  own_peer_id: ravn-mesh-1
  nng:
    pub_sub_address: "ipc:///tmp/ravn-mesh/node-1.ipc"
    req_rep_address: "ipc:///tmp/ravn-mesh/node-1-rep.ipc"

llm:
  model: google/gemma-4-26B-A4B-it
  max_tokens: 8192
  timeout: 300.0
  provider:
    adapter: ravn.adapters.llm.openai.OpenAICompatibleAdapter
    kwargs:
      base_url: "https://vllm.valaskjalf.asgard.niuu.world"
      api_key: ""
      system_prefix: "You are Ravn, an autonomous agent."

discovery:
  enabled: true
  adapter: mdns
  mdns:
    handshake_port: 7490

cascade:
  enabled: true

initiative:
  enabled: true
  max_concurrent_tasks: 3
  queue_journal_path: "/tmp/ravn-mesh/ravn-mesh-1-queue.json"

memory:
  backend: sqlite
  sqlite:
    path: "/tmp/ravn-mesh/ravn-mesh-1.db"

logging:
  level: INFO
