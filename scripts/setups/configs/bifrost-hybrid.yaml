# ─── bifrost-hybrid ──────────────────────────────────────────────────────────
#
# Ravn with Bifrost routing: cloud primary + local Ollama fallback.
#
# What you get:
#   - Cloud provider for quality (fast/balanced/powerful aliases)
#   - Ollama as automatic fallback when cloud is unavailable or rate-limited
#   - Works offline — degrades gracefully to local models
#   - Cost tracking across both providers
#
# Use case:
#   Development workflow where you want cloud quality but need resilience
#   when travelling, on flaky wifi, or when API is overloaded.
#
# Prerequisites:
#   - Ollama running: ollama serve
#   - At least one Ollama model: ollama pull llama3.2:3b
#   - Provider API keys set as env vars (see bifrost.yaml for provider config)
#
# Launch:
#   bifrost --config ~/.ravn/bifrost.yaml &
#   ravn run --config ~/.ravn/config.yaml
# ─────────────────────────────────────────────────────────────────────────────

llm:
  model: balanced
  max_tokens: 8192
  timeout: 180
  provider:
    adapter: ravn.adapters.llm.openai.OpenAICompatibleAdapter
    kwargs:
      base_url: "http://localhost:8088"

memory:
  backend: sqlite

mimir:
  enabled: true
  path: ~/.ravn/mimir
  auto_distill: true
  categories:
    - technical
    - projects
    - research

sleipnir:
  enabled: false

mesh:
  enabled: false

thread:
  enabled: false

wakefulness:
  enabled: false

recap:
  enabled: false

initiative:
  enabled: false

gateway:
  enabled: false

logging:
  level: info
