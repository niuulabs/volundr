# ─── kitchen-sink ────────────────────────────────────────────────────────────
#
# THE FULL MONTY — every feature enabled.
#
# What you get:
#   - Bifrost cloud+local hybrid gateway
#   - Composite Mimir (local + shared remote)
#   - Source synthesis + staleness refresh triggers
#   - Sleipnir event backbone (RabbitMQ)
#   - Sleipnir-based mesh transport + discovery
#   - Cascade coordination with networked delegation
#   - Telegram + HTTP + (optional Discord/Slack) gateway channels
#   - Drive loop with autonomous task execution
#   - Thread enrichment with full scoring weights
#   - Wakefulness: shallow + deep reflection
#   - Recap: return detection + scheduled daily recap
#   - Checkpoint manager with milestone saves
#   - Daily budget gates
#   - Trust gradient
#   - Browser automation (optional)
#   - Embedding-based semantic search
#   - Evolution / self-improvement pass
#   - Skills extraction + suggestion
#
# This is NOT a recommended production config — it exists to show every knob
# and to serve as a reference for cherry-picking features into your own setup.
#
# Prerequisites:
#   - TELEGRAM_BOT_TOKEN
#   - SLEIPNIR_AMQP_URL (RabbitMQ)
#   - RAVN_REALM_ID (for Sleipnir discovery)
#   - MIMIR_BEARER_TOKEN (for shared Mimir)
#   - Ollama running (for Bifrost local fallback)
#   - Provider API keys set as env vars (see bifrost.yaml for provider config)
#
# Launch:
#   bifrost --config ~/.ravn/bifrost.yaml &
#   ravn daemon --config ~/.ravn/config.yaml --persona autonomous-agent
# ─────────────────────────────────────────────────────────────────────────────

llm:
  model: balanced
  max_tokens: 8192
  timeout: 180
  provider:
    adapter: ravn.adapters.llm.openai.OpenAICompatibleAdapter
    kwargs:
      base_url: "http://localhost:8088"

memory:
  backend: sqlite

# ── Embedding (semantic search in memory + Mimir) ─────────────────────────
embedding:
  enabled: true
  rrf_k: 60
  candidate_limit: 200

# ── Mimir: composite ──────────────────────────────────────────────────────
mimir:
  enabled: true
  auto_distill: true
  distill_min_session_minutes: 5
  idle_lint_threshold_minutes: 60
  continuation_threshold_minutes: 30
  categories:
    - technical
    - projects
    - research
    - household
    - self
  search:
    backend: vector                      # embedding-backed semantic search

  instances:
    - name: local
      role: local
      path: ~/.ravn/mimir
      read_priority: 20

    - name: shared
      role: shared
      url: http://mimir.internal:7477
      auth:
        type: bearer
        token_env: MIMIR_BEARER_TOKEN
      read_priority: 10

  write_routing:
    rules:
      - prefix: "personal/"
        mounts: ["local"]
      - prefix: "wiki/"
        mounts: ["shared"]
      - prefix: "projects/"
        mounts: ["shared"]
    default: ["local"]

  source_trigger:
    enabled: true
    poll_interval_seconds: 300
    persona: research-and-distill
    max_tokens: 4096
    retry_after_seconds: 600

  staleness_trigger:
    enabled: true
    schedule_hours: 168
    top_n: 20
    persona: mimir-curator
    max_tokens: 4096

# ── Sleipnir: event backbone ─────────────────────────────────────────────
sleipnir:
  enabled: true
  amqp_url_env: SLEIPNIR_AMQP_URL
  exchange: ravn.events
  agent_id: ""
  reconnect_delay_s: 5.0
  publish_timeout_s: 2.0

# ── Mesh: Sleipnir transport ─────────────────────────────────────────────
mesh:
  enabled: true
  adapter: sleipnir
  rpc_timeout_s: 10.0
  own_peer_id: ""
  sleipnir:
    exchange: ravn.mesh
    rpc_timeout_s: 10.0

# ── Discovery: Sleipnir ──────────────────────────────────────────────────
discovery:
  adapter: sleipnir
  realm_id_env: RAVN_REALM_ID
  heartbeat_interval_s: 30.0
  peer_ttl_s: 90.0
  sleipnir:
    heartbeat_interval_s: 60.0
    convergence_wait_s: 5.0

# ── Cascade ──────────────────────────────────────────────────────────────
cascade:
  enabled: true
  spawn_timeout_s: 30.0
  collect_timeout_s: 120.0
  mesh_delegation_timeout_s: 60.0
  stuck_detection_threshold_s: 300.0
  loop_detection: true
  retry_strategy: replan

# ── Gateway: multi-channel ───────────────────────────────────────────────
gateway:
  enabled: true
  channels:
    telegram:
      enabled: true
      token_env: TELEGRAM_BOT_TOKEN
      allowed_chat_ids: []
      poll_timeout: 30
      retry_delay: 5.0
      message_max_chars: 4096
    http:
      enabled: true
      host: 0.0.0.0
      port: 7477
    # discord:
    #   enabled: true
    #   token_env: DISCORD_BOT_TOKEN
    #   guild_id: ""
    #   command_prefix: "/"
    # slack:
    #   enabled: true
    #   bot_token_env: SLACK_BOT_TOKEN
    #   app_token_env: SLACK_APP_TOKEN
    # matrix:
    #   enabled: true
    #   homeserver_url: https://matrix.org

# ── Drive loop ───────────────────────────────────────────────────────────
initiative:
  enabled: true
  max_concurrent_tasks: 3
  task_queue_max: 50
  queue_journal_path: ~/.ravn/daemon/queue.json
  default_output_mode: ambient
  heartbeat_interval_seconds: 60
  cron_tick_seconds: 30.0

# ── Thread enrichment ────────────────────────────────────────────────────
thread:
  enabled: true
  max_queue_size: 200
  enricher_poll_interval_seconds: 300
  enricher_llm_alias: fast
  decay_rate_per_day: 0.05
  recency_weight: 1.0
  mention_weight: 0.3
  engagement_weight: 0.5
  peer_weight: 0.2
  sub_thread_weight: 0.4

# ── Wakefulness ──────────────────────────────────────────────────────────
wakefulness:
  enabled: true
  silence_threshold_seconds: 1800
  reflection_cooldown_seconds: 3600
  deep_reflection_threshold_seconds: 7200
  deep_reflection_cooldown_seconds: 14400
  llm_alias: fast
  max_intents_per_reflection: 5
  initial_thread_weight: 5.0
  poll_interval_seconds: 60

# ── Recap ────────────────────────────────────────────────────────────────
recap:
  enabled: true
  absence_threshold_seconds: 3600
  return_detection_window_seconds: 300
  scheduled_recap_cron: "0 7 * * *"
  max_threads_in_recap: 10
  persona: produce-recap
  poll_interval_seconds: 60

# ── Checkpoint ───────────────────────────────────────────────────────────
checkpoint:
  enabled: true
  backend: local
  directory: ~/.ravn/checkpoints
  checkpoint_every_n_tools: 10
  max_checkpoints_per_task: 5
  auto_save_before_destructive: true
  budget_milestone_fractions:
    - 0.5
    - 0.75
    - 0.9

# ── Browser automation ──────────────────────────────────────────────────
browser:
  backend: local
  headless: true
  timeout: 30
  allowed_origins:
    - "*.github.com"
    - "*.stackoverflow.com"
    - "*.docs.*"
  blocked_origins:
    - "*.facebook.com"
    - "*.twitter.com"

# ── Evolution / self-improvement ─────────────────────────────────────────
evolution:
  enabled: true
  min_new_outcomes: 5
  max_episodes: 50
  max_outcomes_per_episode: 20
  skill_suggestion_threshold: 0.7
  error_threshold: 0.3
  strategy_threshold: 0.5
  max_suggestions_per_proposal: 10

# ── Skills ───────────────────────────────────────────────────────────────
skill:
  enabled: true
  backend: sqlite
  suggestion_threshold: 0.6
  cache_size: 100

# ── Budget ───────────────────────────────────────────────────────────────
budget:
  daily_cap_usd: 5.0
  input_token_cost_per_million: 3.0
  output_token_cost_per_million: 15.0
  warn_at_percent: 80

# ── Trust gradient ───────────────────────────────────────────────────────
trust:
  reading: free
  writing_notes: free
  sandbox_experiments: free
  consulting_peers: free
  drafting_tickets: free
  producing_recaps: free
  opening_tickets: approval
  closing_tickets: approval
  pushing_branches: approval
  pushing_main: never
  external_messages: approval
  spending_beyond_cap: approval

logging:
  level: info
