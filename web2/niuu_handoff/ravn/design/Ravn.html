<!doctype html>
<html lang="en" data-theme="ice">
<head>
  <meta charset="utf-8"/>
  <title>Flokk · Ravn</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="personas-editor.css"/>
  <script>
    // Default tweaks — wrapped in EDITMODE markers so host can persist
    window.TWEAKS = /*EDITMODE-BEGIN*/{
      "density": "normal",
      "ravensLayout": "split",
      "showBudget": true,
      "showSubs": true
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Data + atoms first -->
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="atoms.jsx"></script>

  <!-- Pages -->
  <script type="text/babel" src="overview.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="personas.jsx"></script>
  <script type="text/babel" src="sessions.jsx"></script>

  <!-- Shell + mount -->
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<window.RavnShell/>);
  </script>
</body>
</html>
