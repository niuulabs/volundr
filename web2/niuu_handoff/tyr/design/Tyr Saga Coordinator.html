<!doctype html>
<html lang="en" data-theme="ice">
<head>
  <meta charset="utf-8"/>
  <title>Týr · Niuu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="styles.css?v=4"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="atoms.jsx"></script>
  <script type="text/babel" src="validation.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="workflow_builder.jsx"></script>
  <script type="text/babel" src="settings_plugin.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ─── TWEAKS — persisted defaults ───
    const TWEAKS = /*EDITMODE-BEGIN*/{
      "theme": "ice",
      "density": "comfortable"
    }/*EDITMODE-END*/;

    function App() {
      const [activeModule, setActiveModule] = useState(() => localStorage.getItem('flokk.module') || 'tyr');
      const [tab, setTab] = useState(() => localStorage.getItem('tyr.tab') || 'workflows');
      const [activeSagaId, setActiveSagaId] = useState(() => localStorage.getItem('tyr.saga') || 'saga-01');
      const [settingsSecId, setSettingsSecId] = useState(() => localStorage.getItem('flokk.settings.sec') || 'workspace');
      const [templates, setTemplates] = useState(window.TEMPLATES);
      const [activeTemplateId, setActiveTemplateId] = useState(() => localStorage.getItem('tyr.tpl') || 'tpl-ship');
      const [tweaks, setTweaks] = useState(TWEAKS);
      const [tweaksOpen, setTweaksOpen] = useState(false);

      useEffect(() => { localStorage.setItem('flokk.module', activeModule); }, [activeModule]);
      useEffect(() => { localStorage.setItem('tyr.tab', tab); }, [tab]);
      useEffect(() => { localStorage.setItem('tyr.saga', activeSagaId); }, [activeSagaId]);
      useEffect(() => { localStorage.setItem('tyr.tpl', activeTemplateId); }, [activeTemplateId]);
      useEffect(() => { localStorage.setItem('flokk.settings.sec', settingsSecId); }, [settingsSecId]);
      useEffect(() => { document.documentElement.setAttribute('data-theme', tweaks.theme); }, [tweaks.theme]);

      const setTweak = (k, v) => {
        setTweaks(prev => ({ ...prev, [k]: v }));
        try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch {}
      };

      // Tweaks protocol — register listener FIRST, then announce
      useEffect(() => {
        const onMsg = (e) => {
          const d = e.data;
          if (!d || !d.type) return;
          if (d.type === '__activate_edit_mode') setTweaksOpen(true);
          if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}
        return () => window.removeEventListener('message', onMsg);
      }, []);

      // Module switcher from the rail
      const onRailSelect = (id) => {
        // Only tyr + settings have real surfaces; others are not implemented here yet.
        if (id === 'tyr' || id === 'settings') setActiveModule(id);
      };

      // ── SETTINGS MODULE surface ─────────────────────────────────
      if (activeModule === 'settings') {
        const settingsCtx = { tweaks, setTweak };
        const sections = window.SETTINGS_REGISTRY;
        return (
          <div className="app" data-density={tweaks.density}>
            <window.Rail active="settings" onSelect={onRailSelect}/>
            <window.SettingsTopbar/>
            <window.SettingsRail sections={sections} activeId={settingsSecId} setActiveId={setSettingsSecId}/>
            <div className="content" data-screen-label="flokk-settings">
              <window.SettingsPluginView sections={sections} activeId={settingsSecId} ctx={settingsCtx}/>
            </div>
            <window.Footer activeTab="settings" activeSaga={null}/>
          </div>
        );
      }

      // ── TÝR MODULE surface ──────────────────────────────────────
      const hasSubnav = ['sagas','workflows','plan'].includes(tab);
      const activeSaga = window.SAGAS.find(s => s.id === activeSagaId);

      return (
        <div className={`app ${hasSubnav ? '' : 'no-subnav'}`} data-density={tweaks.density}>
          <window.Rail active="tyr" onSelect={onRailSelect}/>
          <window.Topbar activeTab={tab} setTab={setTab} onToggleTweaks={() => setTweaksOpen(v => !v)}/>
          {hasSubnav && (
            <window.Subnav
              activeTab={tab}
              activeSagaId={activeSagaId} setActiveSagaId={setActiveSagaId}
              templates={templates}
              activeTemplateId={activeTemplateId} setActiveTemplateId={setActiveTemplateId}
              setTab={setTab}
            />
          )}
          <div className="content" data-screen-label={`tyr-${tab}`}>
            {tab === 'dashboard' && <window.DashboardView setTab={setTab} setActiveSagaId={setActiveSagaId}/>}
            {tab === 'sagas' && <window.SagasView activeSagaId={activeSagaId} setActiveSagaId={setActiveSagaId}/>}
            {tab === 'workflows' && (
              <window.WorkflowsView
                templates={templates} setTemplates={setTemplates}
                activeTemplateId={activeTemplateId} setActiveTemplateId={setActiveTemplateId}
              />
            )}
            {tab === 'plan' && <window.PlanView setTab={setTab}/>}
            {tab === 'dispatch' && <window.DispatchView/>}
          </div>
          <window.Footer activeTab={tab} activeSaga={activeSaga}/>

          {tweaksOpen && (
            <div className="tweaks-panel">
              <div className="tweaks-head">
                <h3>Tweaks</h3>
                <button className="btn sm ghost" onClick={() => setTweaksOpen(false)}>×</button>
              </div>
              <div className="tweaks-body">
                <label className="eyebrow">THEME</label>
                <window.Seg value={tweaks.theme} options={[
                  { value:'ice', label:'ice' },
                  { value:'spring', label:'spring' },
                  { value:'', label:'amber' },
                ]} onChange={v => setTweak('theme', v)}/>
                <label className="eyebrow">DENSITY</label>
                <window.Seg value={tweaks.density} options={[
                  { value:'comfortable', label:'comfortable' },
                  { value:'compact', label:'compact' },
                ]} onChange={v => setTweak('density', v)}/>
                <hr className="sep"/>
                <div className="mono faint" style={{ fontSize:10 }}>tyr · niuu · ice theme</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <style>
    .tweaks-panel {
      position: fixed; bottom: 40px; right: 16px; width: 280px; z-index: 20;
      background: var(--color-bg-secondary); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .tweaks-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--color-border-subtle); }
    .tweaks-head h3 { margin: 0; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .tweaks-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    .tweaks-body .eyebrow { margin-top: 4px; }
  </style>
</body>
</html>
