---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  resource: secret
  version: default
  importDerivedRoles:
    - volundr_roles

  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - tenant_admin

    - actions: ["read", "list"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - tenant_member

    - actions: ["create", "update", "delete"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - owner
