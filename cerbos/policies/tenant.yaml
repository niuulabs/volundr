---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  resource: tenant
  version: default
  importDerivedRoles:
    - volundr_roles

  rules:
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - tenant_admin

    - actions: ["read"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - tenant_member
