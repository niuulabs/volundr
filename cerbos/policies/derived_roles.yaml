---
apiVersion: "api.cerbos.dev/v1"
derivedRoles:
  name: volundr_roles
  definitions:
    - name: owner
      parentRoles: ["volundr:developer", "volundr:admin"]
      condition:
        match:
          expr: request.resource.attr.owner_id == request.principal.id

    - name: tenant_member
      parentRoles: ["volundr:developer", "volundr:viewer", "volundr:admin"]
      condition:
        match:
          expr: >-
            request.resource.attr.tenant_id == "" ||
            request.resource.attr.tenant_id == request.principal.attr.tenant_id

    - name: tenant_admin
      parentRoles: ["volundr:admin"]
      condition:
        match:
          expr: >-
            request.resource.attr.tenant_id == "" ||
            request.resource.attr.tenant_id == request.principal.attr.tenant_id
