---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  resource: personal_access_token
  version: default
  importDerivedRoles:
    - volundr_roles

  rules:
    # Owners can create, read, delete, and list their own PATs
    - actions: ["create", "read", "delete", "list"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - owner
