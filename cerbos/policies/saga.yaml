---
apiVersion: "api.cerbos.dev/v1"
resourcePolicy:
  resource: saga
  version: default
  importDerivedRoles:
    - volundr_roles

  rules:
    # Owners can do anything with their sagas
    - actions: ["*"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - owner

    # Tenant members can read and list sagas
    - actions: ["read", "list"]
      effect: EFFECT_ALLOW
      derivedRoles:
        - tenant_member
