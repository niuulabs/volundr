apiVersion: v2
name: niuu
description: "Niuu AI Platform — umbrella chart"
type: application
version: 0.0.0-tyr.159
appVersion: "0.0.0-tyr.159"
keywords:
  - niuu
  - ai
  - platform
maintainers:
  - name: Niuu Labs
    url: https://github.com/niuulabs
home: https://github.com/niuulabs/volundr
sources:
  - https://github.com/niuulabs/volundr
dependencies:
  - name: volundr
    version: ">=0.0.0-0"
    repository: "file://../volundr"
    condition: volundr.enabled
  - name: tyr
    version: ">=0.0.0-0"
    repository: "file://../tyr"
    condition: tyr.enabled
  - name: niuu-shared
    version: ">=0.0.0-0"
    repository: "file://../niuu-shared"
    condition: niuu-shared.enabled
  - name: bifrost
    version: ">=0.0.0-0"
    repository: "file://../bifrost"
    condition: bifrost.enabled
  - name: mimir
    version: ">=0.0.0-0"
    repository: "file://../mimir"
    condition: mimir-shared.enabled
    alias: mimir-shared
  - name: mimir
    version: ">=0.0.0-0"
    repository: "file://../mimir"
    condition: mimir-kanuck.enabled
    alias: mimir-kanuck
  - name: mimir
    version: ">=0.0.0-0"
    repository: "file://../mimir"
    condition: mimir-research.enabled
    alias: mimir-research
