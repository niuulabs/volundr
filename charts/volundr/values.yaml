# Database migrations configuration
migrations:
  # -- Enable database migrations via init container
  enabled: true
  image:
    # -- Migration image repository
    repository: migrate/migrate
    # -- Migration image tag
    tag: "v4.17.0"
    # -- Migration image pull policy
    pullPolicy: IfNotPresent
  # -- Resources for migration init container
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# -- Init containers
initContainers: []

# -- Container lifecycle hooks
lifecycle: {}
