# FarmSessionDefinition for Skuld-Codex (OpenAI Codex session with embedded VS Code editor)
# This defines the session type that Farm agents can use to create Codex sessions.
# Uses the same shared skuld Helm chart as skuld-claude, parameterised for Codex.

apiVersion: farm.nvidia.com/v1
kind: FarmSessionDefinition
metadata:
  name: skuld-codex
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "volundr.labels" . | nindent 4 }}
spec:
  name: skuld-codex

  # Labels for agent routing - only agents with matching labels will load this
  labels:
    {{- toYaml .Values.sessionDefinitions.skuldCodex.labels | nindent 4 }}

  active: {{ .Values.sessionDefinitions.skuldCodex.active }}

  # Helm chart configuration (same skuld chart, different values)
  helm:
    chart: {{ .Values.sessionDefinitions.skuldCodex.helm.chart }}
    {{- with .Values.sessionDefinitions.skuldCodex.helm.repo }}
    repo: {{ . | quote }}
    {{- end }}
    {{- with .Values.sessionDefinitions.skuldCodex.helm.repoName }}
    repoName: {{ . | quote }}
    {{- end }}
    {{- with .Values.sessionDefinitions.skuldCodex.helm.version }}
    version: {{ . | quote }}
    {{- end }}

    # Default values (can be overridden by task_args at submission)
    values:
      session:
        model: {{ .Values.sessionDefinitions.skuldCodex.defaults.session.model | quote }}

      broker:
        cliType: {{ .Values.sessionDefinitions.skuldCodex.defaults.broker.cliType | default "codex" | quote }}
        transport: {{ .Values.sessionDefinitions.skuldCodex.defaults.broker.transport | default "subprocess" | quote }}
        skipPermissions: {{ .Values.sessionDefinitions.skuldCodex.defaults.broker.skipPermissions | default true }}
        agentTeams: {{ .Values.sessionDefinitions.skuldCodex.defaults.broker.agentTeams | default false }}

      image:
        repository: {{ .Values.sessionDefinitions.skuldCodex.defaults.image.repository }}
        tag: {{ .Values.sessionDefinitions.skuldCodex.defaults.image.tag | quote }}

      resources:
        {{- toYaml .Values.sessionDefinitions.skuldCodex.defaults.resources | nindent 8 }}

      {{- with .Values.sessionDefinitions.skuldCodex.defaults.imagePullSecrets }}
      global:
        imagePullSecrets:
          {{- toYaml . | nindent 10 }}
      {{- end }}

      ingress:
        enabled: true
        className: {{ .Values.sessionDefinitions.skuldCodex.defaults.ingress.className }}
        annotations:
          {{- toYaml .Values.sessionDefinitions.skuldCodex.defaults.ingress.annotations | nindent 10 }}
        tls:
          enabled: {{ .Values.sessionDefinitions.skuldCodex.defaults.ingress.tls.enabled }}
          {{- with .Values.sessionDefinitions.skuldCodex.defaults.ingress.tls.secretName }}
          secretName: {{ . | quote }}
          {{- end }}

      {{- with .Values.sessionDefinitions.skuldCodex.defaults.git }}
      git:
        {{- with .credentials }}
        credentials:
          {{- with .secretName }}
          secretName: {{ . | quote }}
          {{- end }}
        {{- end }}
      {{- end }}

      localServices:
        {{- toYaml .Values.sessionDefinitions.skuldCodex.defaults.localServices | nindent 8 }}

      persistence:
        enabled: true
        existingClaim: {{ include "volundr.sessionsPvcName" . }}
        mountPath: {{ .Values.sessionDefinitions.skuldCodex.defaults.persistence.mountPath | quote }}

      {{- if .Values.storage.home.enabled }}
      homeVolume:
        enabled: true
        existingClaim: {{ include "volundr.homePvcName" . }}
        mountPath: {{ .Values.sessionDefinitions.skuldCodex.defaults.homeVolume.mountPath | default "/volundr/home" | quote }}
        credentialFiles:
          secretName: {{ .Values.sessionDefinitions.skuldCodex.defaults.homeVolume.credentialFiles.secretName | quote }}
          destDir: {{ .Values.sessionDefinitions.skuldCodex.defaults.homeVolume.credentialFiles.destDir | default ".codex" | quote }}
          secretMountPath: {{ .Values.sessionDefinitions.skuldCodex.defaults.homeVolume.credentialFiles.secretMountPath | default "/volundr/secrets/credential-files" | quote }}
      {{- end }}

      envSecrets:
        {{- toYaml .Values.sessionDefinitions.skuldCodex.defaults.envSecrets | nindent 8 }}

      {{- with .Values.sessionDefinitions.skuldCodex.defaults.envVars }}
      envVars:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.sessionDefinitions.skuldCodex.defaults.runtimeClassName }}
      runtimeClassName: {{ . | quote }}
      {{- end }}

      securityContext:
        {{- toYaml .Values.sessionDefinitions.skuldCodex.defaults.securityContext | nindent 8 }}

      # Volundr API URL for token usage reporting (resolved at template time)
      # When Envoy is enabled, use the internal service to bypass JWT validation
      volundr:
        apiUrl: "http://{{ include "volundr.fullname" . }}{{ if .Values.envoy.enabled }}-internal{{ end }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
{{- end }}
