{{- if .Values.migrations.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "volundr.fullname" . }}-migrations
  labels:
    {{- include "volundr.labels" . | nindent 4 }}
data:
  000001_initial_schema.up.sql: |
    -- Initial schema for volundr

    CREATE TABLE IF NOT EXISTS sessions (
        id UUID PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        model VARCHAR(100) NOT NULL,
        repo VARCHAR(500) NOT NULL,
        branch VARCHAR(255) NOT NULL,
        status VARCHAR(20) NOT NULL DEFAULT 'created',
        chat_endpoint TEXT,
        code_endpoint TEXT,
        created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        pod_name VARCHAR(255),
        error TEXT
    );

    CREATE INDEX IF NOT EXISTS idx_sessions_status ON sessions(status);
    CREATE INDEX IF NOT EXISTS idx_sessions_created_at ON sessions(created_at);

    CREATE TABLE IF NOT EXISTS token_usage (
        id UUID PRIMARY KEY,
        session_id UUID NOT NULL REFERENCES sessions(id) ON DELETE CASCADE,
        recorded_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        tokens INTEGER NOT NULL,
        provider VARCHAR(20) NOT NULL,
        model VARCHAR(100) NOT NULL,
        cost NUMERIC(10, 6)
    );

    CREATE INDEX IF NOT EXISTS idx_token_usage_recorded_at ON token_usage(recorded_at);
    CREATE INDEX IF NOT EXISTS idx_token_usage_session_id ON token_usage(session_id);
    CREATE INDEX IF NOT EXISTS idx_token_usage_provider ON token_usage(provider);

  000001_initial_schema.down.sql: |
    -- Rollback initial schema
    DROP TABLE IF EXISTS token_usage;
    DROP TABLE IF EXISTS sessions;

  000002_add_session_columns.up.sql: |
    -- Add last_active, message_count, and tokens_used columns to sessions table

    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS last_active TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW();
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS message_count INTEGER NOT NULL DEFAULT 0;
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS tokens_used INTEGER NOT NULL DEFAULT 0;

    CREATE INDEX IF NOT EXISTS idx_sessions_last_active ON sessions(last_active);

  000002_add_session_columns.down.sql: |
    -- Rollback session columns
    DROP INDEX IF EXISTS idx_sessions_last_active;
    ALTER TABLE sessions DROP COLUMN IF EXISTS tokens_used;
    ALTER TABLE sessions DROP COLUMN IF EXISTS message_count;
    ALTER TABLE sessions DROP COLUMN IF EXISTS last_active;

  000003_add_repo_branch_columns.up.sql: |
    -- Add all potentially missing columns to sessions table (fixes schema drift)
    -- This migration ensures the sessions table matches the domain model

    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS repo VARCHAR(500) NOT NULL DEFAULT '';
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS branch VARCHAR(255) NOT NULL DEFAULT 'main';
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS chat_endpoint TEXT;
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS code_endpoint TEXT;
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS last_active TIMESTAMP WITH TIME ZONE DEFAULT NOW();
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS message_count INTEGER NOT NULL DEFAULT 0;
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS tokens_used INTEGER NOT NULL DEFAULT 0;
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS pod_name VARCHAR(255);
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS error TEXT;

    CREATE INDEX IF NOT EXISTS idx_sessions_status ON sessions(status);
    CREATE INDEX IF NOT EXISTS idx_sessions_created_at ON sessions(created_at);
    CREATE INDEX IF NOT EXISTS idx_sessions_last_active ON sessions(last_active);

  000003_add_repo_branch_columns.down.sql: |
    -- Remove columns added by this migration
    -- Note: Only removes columns that weren't in the original minimal schema

    DROP INDEX IF EXISTS idx_sessions_last_active;

    ALTER TABLE sessions DROP COLUMN IF EXISTS repo;
    ALTER TABLE sessions DROP COLUMN IF EXISTS branch;
    ALTER TABLE sessions DROP COLUMN IF EXISTS chat_endpoint;
    ALTER TABLE sessions DROP COLUMN IF EXISTS code_endpoint;
    ALTER TABLE sessions DROP COLUMN IF EXISTS last_active;
    ALTER TABLE sessions DROP COLUMN IF EXISTS message_count;
    ALTER TABLE sessions DROP COLUMN IF EXISTS tokens_used;
    ALTER TABLE sessions DROP COLUMN IF EXISTS pod_name;
    ALTER TABLE sessions DROP COLUMN IF EXISTS error;

  000004_fix_schema_drift.up.sql: |
    -- Fix remaining schema drift - add all missing columns

    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS chat_endpoint TEXT;
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS code_endpoint TEXT;
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS last_active TIMESTAMP WITH TIME ZONE DEFAULT NOW();
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS message_count INTEGER NOT NULL DEFAULT 0;
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS tokens_used INTEGER NOT NULL DEFAULT 0;
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS pod_name VARCHAR(255);
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS error TEXT;

    CREATE INDEX IF NOT EXISTS idx_sessions_status ON sessions(status);
    CREATE INDEX IF NOT EXISTS idx_sessions_created_at ON sessions(created_at);
    CREATE INDEX IF NOT EXISTS idx_sessions_last_active ON sessions(last_active);

  000004_fix_schema_drift.down.sql: |
    -- Rollback schema drift fix

    DROP INDEX IF EXISTS idx_sessions_last_active;

    ALTER TABLE sessions DROP COLUMN IF EXISTS chat_endpoint;
    ALTER TABLE sessions DROP COLUMN IF EXISTS code_endpoint;
    ALTER TABLE sessions DROP COLUMN IF EXISTS last_active;
    ALTER TABLE sessions DROP COLUMN IF EXISTS message_count;
    ALTER TABLE sessions DROP COLUMN IF EXISTS tokens_used;
    ALTER TABLE sessions DROP COLUMN IF EXISTS pod_name;
    ALTER TABLE sessions DROP COLUMN IF EXISTS error;

  000005_chronicles.up.sql: |
    -- Add chronicles table for session history and relaunch

    CREATE TABLE IF NOT EXISTS chronicles (
        id UUID PRIMARY KEY,
        session_id UUID REFERENCES sessions(id) ON DELETE SET NULL,
        status VARCHAR(20) NOT NULL DEFAULT 'draft',
        project VARCHAR(255) NOT NULL,
        repo VARCHAR(500) NOT NULL,
        branch VARCHAR(255) NOT NULL,
        model VARCHAR(100) NOT NULL,
        config_snapshot JSONB NOT NULL DEFAULT '{}',
        summary TEXT,
        key_changes JSONB NOT NULL DEFAULT '[]',
        unfinished_work TEXT,
        token_usage INTEGER NOT NULL DEFAULT 0,
        cost NUMERIC(10, 6),
        duration_seconds INTEGER,
        tags TEXT[] NOT NULL DEFAULT '{}',
        parent_chronicle_id UUID REFERENCES chronicles(id) ON DELETE SET NULL,
        created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_chronicles_session_id ON chronicles(session_id);
    CREATE INDEX IF NOT EXISTS idx_chronicles_project ON chronicles(project);
    CREATE INDEX IF NOT EXISTS idx_chronicles_repo ON chronicles(repo);
    CREATE INDEX IF NOT EXISTS idx_chronicles_created_at ON chronicles(created_at);
    CREATE INDEX IF NOT EXISTS idx_chronicles_tags ON chronicles USING GIN(tags);
    CREATE INDEX IF NOT EXISTS idx_chronicles_parent_id ON chronicles(parent_chronicle_id);

  000005_chronicles.down.sql: |
    -- Rollback chronicles table

    DROP INDEX IF EXISTS idx_chronicles_parent_id;
    DROP INDEX IF EXISTS idx_chronicles_tags;
    DROP INDEX IF EXISTS idx_chronicles_created_at;
    DROP INDEX IF EXISTS idx_chronicles_repo;
    DROP INDEX IF EXISTS idx_chronicles_project;
    DROP INDEX IF EXISTS idx_chronicles_session_id;
    DROP TABLE IF EXISTS chronicles;

  000006_chronicle_events.up.sql: |
    -- Add chronicle_events table for session timeline tracking

    CREATE TABLE IF NOT EXISTS chronicle_events (
        id UUID PRIMARY KEY,
        chronicle_id UUID NOT NULL REFERENCES chronicles(id) ON DELETE CASCADE,
        session_id UUID NOT NULL REFERENCES sessions(id) ON DELETE CASCADE,
        t INTEGER NOT NULL,
        type VARCHAR(20) NOT NULL,
        label TEXT NOT NULL,
        tokens INTEGER,
        action VARCHAR(20),
        ins INTEGER,
        del INTEGER,
        hash VARCHAR(40),
        exit_code INTEGER,
        created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_chronicle_events_chronicle_id ON chronicle_events(chronicle_id);
    CREATE INDEX IF NOT EXISTS idx_chronicle_events_session_id ON chronicle_events(session_id);
    CREATE INDEX IF NOT EXISTS idx_chronicle_events_t ON chronicle_events(t);

  000006_chronicle_events.down.sql: |
    -- Rollback chronicle_events table

    DROP INDEX IF EXISTS idx_chronicle_events_t;
    DROP INDEX IF EXISTS idx_chronicle_events_session_id;
    DROP INDEX IF EXISTS idx_chronicle_events_chronicle_id;
    DROP TABLE IF EXISTS chronicle_events;

  000007_session_events.up.sql: |
    -- Add session_events table for the event pipeline

    CREATE TABLE IF NOT EXISTS session_events (
        id              UUID PRIMARY KEY,
        session_id      UUID NOT NULL REFERENCES sessions(id) ON DELETE CASCADE,
        event_type      VARCHAR(30) NOT NULL,
        timestamp       TIMESTAMP WITH TIME ZONE NOT NULL,
        data            JSONB NOT NULL DEFAULT '{}',
        tokens_in       INTEGER,
        tokens_out      INTEGER,
        cost            NUMERIC(10, 6),
        duration_ms     INTEGER,
        model           VARCHAR(100),
        sequence        INTEGER NOT NULL,
        created_at      TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_session_events_session_id
        ON session_events(session_id);
    CREATE INDEX IF NOT EXISTS idx_session_events_session_type
        ON session_events(session_id, event_type);
    CREATE INDEX IF NOT EXISTS idx_session_events_session_ts
        ON session_events(session_id, timestamp);
    CREATE INDEX IF NOT EXISTS idx_session_events_sequence
        ON session_events(session_id, sequence);

  000007_session_events.down.sql: |
    -- Rollback session_events table

    DROP TABLE IF EXISTS session_events;

  000008_saved_prompts.up.sql: |
    -- Add saved_prompts table for reusable prompt storage

    CREATE TABLE IF NOT EXISTS saved_prompts (
        id              UUID PRIMARY KEY,
        name            VARCHAR(255) NOT NULL,
        content         TEXT NOT NULL,
        scope           VARCHAR(20) NOT NULL DEFAULT 'global',
        project_repo    VARCHAR(500),
        tags            TEXT[] NOT NULL DEFAULT '{}',
        created_at      TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        updated_at      TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_saved_prompts_scope
        ON saved_prompts(scope);
    CREATE INDEX IF NOT EXISTS idx_saved_prompts_project_repo
        ON saved_prompts(project_repo);
    CREATE INDEX IF NOT EXISTS idx_saved_prompts_tags
        ON saved_prompts USING GIN(tags);
    CREATE INDEX IF NOT EXISTS idx_saved_prompts_name_content
        ON saved_prompts USING GIN(to_tsvector('english', name || ' ' || content));

  000008_saved_prompts.down.sql: |
    -- Rollback saved_prompts table

    DROP TABLE IF EXISTS saved_prompts;

  000009_session_archive.up.sql: |
    -- Add archived_at column and index for session archiving

    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS archived_at TIMESTAMP WITH TIME ZONE;
    CREATE INDEX IF NOT EXISTS idx_sessions_archived_at ON sessions(archived_at);

  000009_session_archive.down.sql: |
    -- Rollback session archive column

    DROP INDEX IF EXISTS idx_sessions_archived_at;
    ALTER TABLE sessions DROP COLUMN IF EXISTS archived_at;

  000010_project_mappings.up.sql: |
    -- Add project_mappings table and tracker_issue_id column on sessions

    CREATE TABLE IF NOT EXISTS project_mappings (
        id              UUID PRIMARY KEY,
        repo_url        VARCHAR(500) NOT NULL,
        project_id      VARCHAR(255) NOT NULL,
        project_name    VARCHAR(255) NOT NULL DEFAULT '',
        created_at      TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
    );

    CREATE UNIQUE INDEX IF NOT EXISTS idx_project_mappings_repo_url
        ON project_mappings(repo_url);
    CREATE INDEX IF NOT EXISTS idx_project_mappings_project_id
        ON project_mappings(project_id);

    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS tracker_issue_id VARCHAR(255);

  000010_project_mappings.down.sql: |
    -- Rollback project_mappings table and tracker_issue_id column

    ALTER TABLE sessions DROP COLUMN IF EXISTS tracker_issue_id;

    DROP TABLE IF EXISTS project_mappings;

  000011_volundr_presets.up.sql: |
    -- Add volundr_presets table and preset_id on sessions

    CREATE TABLE IF NOT EXISTS volundr_presets (
        id                UUID PRIMARY KEY,
        name              VARCHAR(255) NOT NULL,
        description       TEXT NOT NULL DEFAULT '',
        is_default        BOOLEAN NOT NULL DEFAULT FALSE,
        cli_tool          VARCHAR(100) NOT NULL DEFAULT '',
        workload_type     VARCHAR(100) NOT NULL DEFAULT 'session',
        model             VARCHAR(100),
        system_prompt     TEXT,
        resource_config   JSONB NOT NULL DEFAULT '{}',
        mcp_servers       JSONB NOT NULL DEFAULT '[]',
        terminal_sidecar  JSONB NOT NULL DEFAULT '{}',
        skills            JSONB NOT NULL DEFAULT '[]',
        rules             JSONB NOT NULL DEFAULT '[]',
        env_vars          JSONB NOT NULL DEFAULT '{}',
        env_secret_refs   JSONB NOT NULL DEFAULT '[]',
        workload_config   JSONB NOT NULL DEFAULT '{}',
        created_at        TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        updated_at        TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
    );

    CREATE UNIQUE INDEX IF NOT EXISTS idx_volundr_presets_name
        ON volundr_presets(name);
    CREATE INDEX IF NOT EXISTS idx_volundr_presets_cli_tool
        ON volundr_presets(cli_tool);
    CREATE INDEX IF NOT EXISTS idx_volundr_presets_is_default
        ON volundr_presets(is_default);

    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS preset_id UUID;

  000011_volundr_presets.down.sql: |
    -- Rollback volundr_presets table and preset_id column

    ALTER TABLE sessions DROP COLUMN IF EXISTS preset_id;

    DROP TABLE IF EXISTS volundr_presets;

  000012_tenant_hierarchy.up.sql: |
    -- Tenant hierarchy: tenants, users, tenant_memberships

    CREATE TABLE IF NOT EXISTS tenants (
        id              TEXT PRIMARY KEY,
        path            TEXT NOT NULL UNIQUE,
        name            TEXT NOT NULL,
        parent_id       TEXT REFERENCES tenants(id),
        tier            TEXT NOT NULL DEFAULT 'developer',
        max_sessions    INT NOT NULL DEFAULT 5,
        max_storage_gb  INT NOT NULL DEFAULT 50,
        created_at      TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_tenants_path ON tenants(path);
    CREATE INDEX IF NOT EXISTS idx_tenants_parent_id ON tenants(parent_id);

    CREATE TABLE IF NOT EXISTS users (
        id              TEXT PRIMARY KEY,
        email           TEXT NOT NULL,
        display_name    TEXT NOT NULL DEFAULT '',
        status          TEXT NOT NULL DEFAULT 'active',
        home_pvc        TEXT,
        created_at      TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        updated_at      TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
    );

    CREATE UNIQUE INDEX IF NOT EXISTS idx_users_email ON users(email);
    CREATE INDEX IF NOT EXISTS idx_users_status ON users(status);

    CREATE TABLE IF NOT EXISTS tenant_memberships (
        user_id         TEXT NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        tenant_id       TEXT NOT NULL REFERENCES tenants(id) ON DELETE CASCADE,
        role            TEXT NOT NULL DEFAULT 'volundr:developer',
        granted_at      TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        PRIMARY KEY (user_id, tenant_id)
    );

    CREATE INDEX IF NOT EXISTS idx_tenant_memberships_tenant_id ON tenant_memberships(tenant_id);
    CREATE INDEX IF NOT EXISTS idx_tenant_memberships_user_id ON tenant_memberships(user_id);

    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS owner_id TEXT REFERENCES users(id);
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS tenant_id TEXT REFERENCES tenants(id);

    CREATE INDEX IF NOT EXISTS idx_sessions_owner_id ON sessions(owner_id);
    CREATE INDEX IF NOT EXISTS idx_sessions_tenant_id ON sessions(tenant_id);

  000012_tenant_hierarchy.down.sql: |
    -- Rollback tenant hierarchy

    ALTER TABLE sessions DROP COLUMN IF EXISTS tenant_id;
    ALTER TABLE sessions DROP COLUMN IF EXISTS owner_id;

    DROP TABLE IF EXISTS tenant_memberships;
    DROP TABLE IF EXISTS users;
    DROP TABLE IF EXISTS tenants;

  000013_credential_metadata.up.sql: |
    -- Credential metadata table for the pluggable credential store

    CREATE TABLE IF NOT EXISTS credential_metadata (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        name VARCHAR(253) NOT NULL,
        secret_type VARCHAR(50) NOT NULL,
        keys TEXT[] NOT NULL DEFAULT '{}',
        metadata JSONB NOT NULL DEFAULT '{}',
        owner_id VARCHAR(255) NOT NULL,
        owner_type VARCHAR(50) NOT NULL,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        UNIQUE(owner_type, owner_id, name)
    );

    CREATE INDEX IF NOT EXISTS idx_credential_metadata_owner
        ON credential_metadata(owner_type, owner_id);

  000013_credential_metadata.down.sql: |
    -- Rollback credential metadata table

    DROP TABLE IF EXISTS credential_metadata;

  000014_integration_connections.up.sql: |
    -- Integration connections for pluggable issue trackers and other integrations

    CREATE TABLE IF NOT EXISTS integration_connections (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id VARCHAR(255) NOT NULL,
        integration_type VARCHAR(50) NOT NULL,
        adapter VARCHAR(500) NOT NULL,
        credential_name VARCHAR(253) NOT NULL,
        config JSONB NOT NULL DEFAULT '{}',
        enabled BOOLEAN NOT NULL DEFAULT true,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_integration_connections_user
        ON integration_connections(user_id, integration_type);

  000014_integration_connections.down.sql: |
    -- Rollback integration connections

    DROP TABLE IF EXISTS integration_connections;

  000015_workspaces.up.sql: |
    -- Workspaces table for per-user/per-session storage isolation

    CREATE TABLE IF NOT EXISTS workspaces (
        id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        session_id      UUID NOT NULL REFERENCES sessions(id),
        user_id         TEXT NOT NULL REFERENCES users(id),
        tenant_id       TEXT NOT NULL REFERENCES tenants(id),
        pvc_name        TEXT NOT NULL,
        status          TEXT NOT NULL DEFAULT 'active',
        size_gb         INT NOT NULL DEFAULT 1,
        created_at      TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW(),
        archived_at     TIMESTAMP WITH TIME ZONE,
        deleted_at      TIMESTAMP WITH TIME ZONE
    );

    CREATE INDEX IF NOT EXISTS idx_workspaces_session_id ON workspaces(session_id);
    CREATE INDEX IF NOT EXISTS idx_workspaces_user_id ON workspaces(user_id);
    CREATE INDEX IF NOT EXISTS idx_workspaces_tenant_id ON workspaces(tenant_id);
    CREATE INDEX IF NOT EXISTS idx_workspaces_status ON workspaces(status);

    ALTER TABLE users ADD COLUMN IF NOT EXISTS provisioned_at TIMESTAMP WITH TIME ZONE;
    ALTER TABLE users ADD COLUMN IF NOT EXISTS provision_error TEXT;

    -- Allow sessions to reference an existing workspace for reuse
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS workspace_id UUID REFERENCES workspaces(id);

  000015_workspaces.down.sql: |
    -- Rollback workspaces table and user provisioning columns

    ALTER TABLE sessions DROP COLUMN IF EXISTS workspace_id;

    ALTER TABLE users DROP COLUMN IF EXISTS provision_error;
    ALTER TABLE users DROP COLUMN IF EXISTS provisioned_at;

    DROP TABLE IF EXISTS workspaces;

  000016_session_source.up.sql: |
    -- Migrate sessions from flat repo/branch columns to source JSONB.
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS source JSONB;

    UPDATE sessions
    SET source = jsonb_build_object(
        'type', 'git',
        'repo', COALESCE(repo, ''),
        'branch', COALESCE(branch, 'main')
    )
    WHERE source IS NULL;

    ALTER TABLE sessions ALTER COLUMN source SET DEFAULT '{"type": "git", "repo": "", "branch": "main"}'::jsonb;
    ALTER TABLE sessions ALTER COLUMN source SET NOT NULL;

    ALTER TABLE sessions DROP COLUMN IF EXISTS repo;
    ALTER TABLE sessions DROP COLUMN IF EXISTS branch;

  000016_session_source.down.sql: |
    -- Reverse migration: restore flat repo/branch columns from source JSONB.
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS repo VARCHAR(500) DEFAULT '';
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS branch VARCHAR(255) DEFAULT 'main';

    UPDATE sessions
    SET repo = COALESCE(source->>'repo', ''),
        branch = COALESCE(source->>'branch', 'main')
    WHERE source IS NOT NULL AND source->>'type' = 'git';

    ALTER TABLE sessions DROP COLUMN IF EXISTS source;

  000017_preset_source_integrations_scripts.up.sql: |
    -- Add source, integration_ids, and setup_scripts to presets
    ALTER TABLE volundr_presets ADD COLUMN IF NOT EXISTS source JSONB;
    ALTER TABLE volundr_presets ADD COLUMN IF NOT EXISTS integration_ids JSONB NOT NULL DEFAULT '[]';
    ALTER TABLE volundr_presets ADD COLUMN IF NOT EXISTS setup_scripts JSONB NOT NULL DEFAULT '[]';

  000017_preset_source_integrations_scripts.down.sql: |
    -- Rollback source, integration_ids, and setup_scripts from presets
    ALTER TABLE volundr_presets DROP COLUMN IF EXISTS setup_scripts;
    ALTER TABLE volundr_presets DROP COLUMN IF EXISTS integration_ids;
    ALTER TABLE volundr_presets DROP COLUMN IF EXISTS source;

  000018_integration_slug.up.sql: |
    -- Add slug column to integration_connections for catalog definition references
    ALTER TABLE integration_connections
        ADD COLUMN IF NOT EXISTS slug VARCHAR(100) NOT NULL DEFAULT '';

  000018_integration_slug.down.sql: |
    ALTER TABLE integration_connections DROP COLUMN IF EXISTS slug;

  000019_session_issue_link.up.sql: |
    -- Add issue tracker URL to sessions for direct linking
    ALTER TABLE sessions
        ADD COLUMN IF NOT EXISTS issue_tracker_url VARCHAR(500);

  000019_session_issue_link.down.sql: |
    ALTER TABLE sessions DROP COLUMN IF EXISTS issue_tracker_url;

  000020_feature_toggles.up.sql: |
    -- Feature toggles: admin-level overrides for which features are available.
    CREATE TABLE IF NOT EXISTS feature_toggles (
        feature_key     TEXT PRIMARY KEY,
        enabled         BOOLEAN NOT NULL DEFAULT true,
        updated_at      TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
    );

    -- User feature preferences: per-user visibility and ordering.
    CREATE TABLE IF NOT EXISTS user_feature_preferences (
        user_id         TEXT NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        feature_key     TEXT NOT NULL,
        visible         BOOLEAN NOT NULL DEFAULT true,
        sort_order      INT NOT NULL DEFAULT 0,
        PRIMARY KEY (user_id, feature_key)
    );

    CREATE INDEX IF NOT EXISTS idx_user_feature_prefs_user
        ON user_feature_preferences(user_id);

  000020_feature_toggles.down.sql: |
    DROP TABLE IF EXISTS user_feature_preferences;
    DROP TABLE IF EXISTS feature_toggles;

  000021_personal_access_tokens.up.sql: |
    -- Personal access tokens: stores PAT metadata and bcrypt hash of the raw JWT.
    CREATE TABLE IF NOT EXISTS personal_access_tokens (
        id           UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        owner_id     TEXT        NOT NULL REFERENCES users(id) ON DELETE CASCADE,
        name         TEXT        NOT NULL,
        token_hash   TEXT        NOT NULL,
        created_at   TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        expires_at   TIMESTAMPTZ,
        last_used_at TIMESTAMPTZ
    );

    CREATE INDEX IF NOT EXISTS idx_pats_owner_id ON personal_access_tokens(owner_id);

  000021_personal_access_tokens.down.sql: |
    DROP TABLE IF EXISTS personal_access_tokens;

  000022_pat_unique_owner_name.up.sql: |
    -- Enforce one PAT name per owner
    CREATE UNIQUE INDEX IF NOT EXISTS idx_pats_owner_name ON personal_access_tokens(owner_id, name);

  000022_pat_unique_owner_name.down.sql: |
    DROP INDEX IF EXISTS idx_pats_owner_name;

  000023_session_activity_state.up.sql: |
    -- Add activity state tracking columns to sessions table
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS activity_state TEXT DEFAULT 'idle';
    ALTER TABLE sessions ADD COLUMN IF NOT EXISTS activity_metadata JSONB DEFAULT '{}';

  000023_session_activity_state.down.sql: |
    ALTER TABLE sessions DROP COLUMN IF EXISTS activity_metadata;
    ALTER TABLE sessions DROP COLUMN IF EXISTS activity_state;

  000024_rename_user_id_to_owner_id.up.sql: |
    -- Rename user_id to owner_id in integration_connections
    -- Code already references owner_id; this migration aligns the schema.
    ALTER TABLE integration_connections RENAME COLUMN user_id TO owner_id;
    DROP INDEX IF EXISTS idx_integration_connections_user;
    CREATE INDEX IF NOT EXISTS idx_integration_connections_owner
        ON integration_connections(owner_id, integration_type);

  000024_rename_user_id_to_owner_id.down.sql: |
    ALTER TABLE integration_connections RENAME COLUMN owner_id TO user_id;
    DROP INDEX IF EXISTS idx_integration_connections_owner;
    CREATE INDEX IF NOT EXISTS idx_integration_connections_user
        ON integration_connections(user_id, integration_type);

  000025_bifrost_requests.up.sql: |
    -- Bifrost per-request accounting table.
    -- One row per LLM request: token counts, cost attribution, and latency.
    CREATE TABLE IF NOT EXISTS bifrost_requests (
        id                 BIGSERIAL   PRIMARY KEY,
        request_id         TEXT        NOT NULL DEFAULT '',
        agent_id           TEXT        NOT NULL,
        tenant_id          TEXT        NOT NULL,
        session_id         TEXT        NOT NULL DEFAULT '',
        saga_id            TEXT        NOT NULL DEFAULT '',
        model              TEXT        NOT NULL,
        provider           TEXT        NOT NULL DEFAULT '',
        input_tokens       INTEGER     NOT NULL DEFAULT 0,
