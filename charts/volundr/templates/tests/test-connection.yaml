apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "volundr.fullname" . }}-test-connection"
  labels:
    {{- include "volundr.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox:stable
      command: ['wget']
      args:
        - '--timeout=10'
        - '--spider'
        - 'http://{{ include "volundr.fullname" . }}:{{ .Values.service.port | default 80 }}/health'
  restartPolicy: Never
