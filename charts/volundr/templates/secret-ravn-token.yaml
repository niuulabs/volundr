{{- if eq .Values.personaSource.mode "http" }}
{{- if .Values.personaSource.ravnToken }}
---
# PAT used by ravn sidecars to authenticate against the volundr personas REST API.
# Only created when personaSource.mode == "http" and personaSource.ravnToken is set.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "volundr.fullname" . }}-ravn-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "volundr.labels" . | nindent 4 }}
    app.kubernetes.io/component: persona-registry
type: Opaque
data:
  token: {{ .Values.personaSource.ravnToken | b64enc | quote }}
{{- end }}
{{- end }}
