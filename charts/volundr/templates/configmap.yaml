apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "volundr.fullname" . }}
  labels:
    {{- include "volundr.labels" . | nindent 4 }}
data:
  # Application configuration (environment variables)
  LOG_LEVEL: {{ .Values.config.logLevel | default "info" | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | default "json" | quote }}
  HOST: {{ .Values.config.host | default "0.0.0.0" | quote }}
  PORT: {{ .Values.service.targetPort | default 8080 | quote }}
  WORKERS: {{ .Values.config.workers | default 4 | quote }}
  SESSION_TIMEOUT: {{ .Values.config.sessionTimeout | default "3600" | quote }}
  MAX_SESSIONS_PER_USER: {{ .Values.config.maxSessionsPerUser | default "5" | quote }}
  CORS_ORIGINS: {{ .Values.config.corsOrigins | default "*" | quote }}
  CORS_ALLOW_CREDENTIALS: {{ .Values.config.corsAllowCredentials | default "true" | quote }}
  {{- with .Values.config.extra }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}

  # Application configuration file (YAML format)
  config.yaml: |
    # Volundr configuration (generated by Helm)

    logging:
      level: {{ .Values.config.logLevel | default "info" | quote }}
      format: {{ .Values.config.logFormat | default "json" | quote }}

    database:
      min_pool_size: {{ .Values.database.minPoolSize | default 5 }}
      max_pool_size: {{ .Values.database.maxPoolSize | default 20 }}

    provisioning:
      timeout_seconds: {{ .Values.provisioning.timeoutSeconds | default 300.0 }}
      initial_delay_seconds: {{ .Values.provisioning.initialDelaySeconds | default 5.0 }}

    pod_manager:
      adapter: {{ .Values.podManager.adapter | quote }}
      kwargs: {{ .Values.podManager.kwargs | toJson }}
      {{- if .Values.podManager.secretKwargs }}
      secret_kwargs_env:
        {{- range .Values.podManager.secretKwargs }}
        {{ .kwarg }}: POD_MANAGER_SK_{{ .kwarg | upper }}
        {{- end }}
      {{- else }}
      secret_kwargs_env: {}
      {{- end }}

    chronicle:
      auto_create_on_stop: {{ .Values.chronicle.autoCreateOnStop | default true }}
      summary_model: {{ .Values.chronicle.summaryModel | default "claude-haiku-4-5-20251001" | quote }}
      summary_max_tokens: {{ .Values.chronicle.summaryMaxTokens | default 2000 }}
      {{- if and .Values.chronicle.retentionDays (ne (int .Values.chronicle.retentionDays) 0) }}
      retention_days: {{ .Values.chronicle.retentionDays }}
      {{- end }}

    {{- if .Values.profiles }}
    profiles:
      {{- range .Values.profiles }}
      - name: {{ .name | quote }}
        {{- if .description }}
        description: {{ .description | quote }}
        {{- end }}
        {{- if .workloadType }}
        workload_type: {{ .workloadType | quote }}
        {{- end }}
        {{- if .model }}
        model: {{ .model | quote }}
        {{- end }}
        {{- if .systemPrompt }}
        system_prompt: {{ .systemPrompt | quote }}
        {{- end }}
        {{- if .resourceConfig }}
        resource_config: {{ .resourceConfig | toJson }}
        {{- end }}
        {{- if .mcpServers }}
        mcp_servers: {{ .mcpServers | toJson }}
        {{- end }}
        {{- if .envVars }}
        env_vars: {{ .envVars | toJson }}
        {{- end }}
        {{- if .envSecretRefs }}
        env_secret_refs: {{ .envSecretRefs | toJson }}
        {{- end }}
        {{- if .workloadConfig }}
        workload_config: {{ .workloadConfig | toJson }}
        {{- end }}
        {{- if .isDefault }}
        is_default: {{ .isDefault }}
        {{- end }}
      {{- end }}
    {{- end }}

    {{- if .Values.templates }}
    templates:
      {{- range .Values.templates }}
      - name: {{ .name | quote }}
        {{- if .description }}
        description: {{ .description | quote }}
        {{- end }}
        {{- if .profileName }}
        profile_name: {{ .profileName | quote }}
        {{- end }}
        {{- if .repos }}
        repos: {{ .repos | toJson }}
        {{- end }}
        {{- if .setupScripts }}
        setup_scripts: {{ .setupScripts | toJson }}
        {{- end }}
        {{- if .workspaceLayout }}
        workspace_layout: {{ .workspaceLayout | toJson }}
        {{- end }}
        {{- if .isDefault }}
        is_default: {{ .isDefault }}
        {{- end }}
      {{- end }}
    {{- end }}

    git:
      validate_on_create: {{ .Values.git.validateOnCreate }}
      workflow:
        auto_branch: {{ .Values.git.workflow.autoBranch | default true }}
        branch_prefix: {{ .Values.git.workflow.branchPrefix | default "volundr/session" | quote }}
        protect_main: {{ .Values.git.workflow.protectMain | default true }}
        default_merge_method: {{ .Values.git.workflow.defaultMergeMethod | default "squash" | quote }}
        auto_merge_threshold: {{ .Values.git.workflow.autoMergeThreshold | default 0.9 }}
        notify_merge_threshold: {{ .Values.git.workflow.notifyMergeThreshold | default 0.6 }}
      github:
        enabled: {{ .Values.git.github.enabled }}
        base_url: "https://api.github.com"
        {{- if .Values.git.github.instances }}
        instances:
          {{- range $i, $inst := .Values.git.github.instances }}
          - name: {{ $inst.name | quote }}
            base_url: {{ $inst.baseUrl | quote }}
            {{- if $inst.existingSecret }}
            token_env: GIT_GITHUB_INSTANCE_{{ $i }}_TOKEN
            {{- end }}
            {{- if $inst.orgs }}
            orgs:
              {{- range $inst.orgs }}
              - {{ . | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- else }}
        instances: []
        {{- end }}
      gitlab:
        enabled: {{ .Values.git.gitlab.enabled }}
        base_url: "https://gitlab.com"
        {{- if .Values.git.gitlab.instances }}
        instances:
          {{- range $i, $inst := .Values.git.gitlab.instances }}
          - name: {{ $inst.name | quote }}
            base_url: {{ $inst.baseUrl | quote }}
            {{- if $inst.existingSecret }}
            token_env: GIT_GITLAB_INSTANCE_{{ $i }}_TOKEN
            {{- end }}
            {{- if $inst.orgs }}
            orgs:
              {{- range $inst.orgs }}
              - {{ . | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- else }}
        instances: []
        {{- end }}

    storage:
      adapter: {{ .Values.storageAdapter.adapter | quote }}
      kwargs: {{ .Values.storageAdapter.kwargs | toJson }}
      {{- if .Values.storageAdapter.secretKwargs }}
      secret_kwargs_env:
        {{- range .Values.storageAdapter.secretKwargs }}
        {{ .kwarg }}: STORAGE_ADAPTER_SK_{{ .kwarg | upper }}
        {{- end }}
      {{- else }}
      secret_kwargs_env: {}
      {{- end }}

    resource_provider:
      adapter: {{ .Values.resourceProvider.adapter | quote }}
      kwargs: {{ .Values.resourceProvider.kwargs | toJson }}
      {{- if .Values.resourceProvider.secretKwargs }}
      secret_kwargs_env:
        {{- range .Values.resourceProvider.secretKwargs }}
        {{ .kwarg }}: RESOURCE_PROVIDER_SK_{{ .kwarg | upper }}
        {{- end }}
      {{- else }}
      secret_kwargs_env: {}
      {{- end }}

    identity:
      adapter: {{ .Values.identity.adapter | quote }}
      kwargs: {{ .Values.identity.kwargs | toJson }}
      {{- if .Values.identity.secretKwargs }}
      secret_kwargs_env:
        {{- range .Values.identity.secretKwargs }}
        {{ .kwarg }}: IDENTITY_SK_{{ .kwarg | upper }}
        {{- end }}
      {{- else }}
      secret_kwargs_env: {}
      {{- end }}
      {{- if .Values.identity.roleMapping }}
      role_mapping:
        {{- range $key, $value := .Values.identity.roleMapping }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}

    authorization:
      adapter: {{ .Values.authorization.adapter | quote }}
      kwargs: {{ .Values.authorization.kwargs | toJson }}
      {{- if .Values.authorization.secretKwargs }}
      secret_kwargs_env:
        {{- range .Values.authorization.secretKwargs }}
        {{ .kwarg }}: AUTHORIZATION_SK_{{ .kwarg | upper }}
        {{- end }}
      {{- else }}
      secret_kwargs_env: {}
      {{- end }}

    credential_store:
      adapter: {{ .Values.credentialStore.adapter | quote }}
      kwargs: {{ .Values.credentialStore.kwargs | toJson }}
      {{- if .Values.credentialStore.secretKwargs }}
      secret_kwargs_env:
        {{- range .Values.credentialStore.secretKwargs }}
        {{ .kwarg }}: CREDENTIAL_STORE_SK_{{ .kwarg | upper }}
        {{- end }}
      {{- else }}
      secret_kwargs_env: {}
      {{- end }}

    secret_injection:
      adapter: {{ .Values.secretInjection.adapter | quote }}
      kwargs: {{ .Values.secretInjection.kwargs | toJson }}
      {{- if .Values.secretInjection.secretKwargs }}
      secret_kwargs_env:
        {{- range .Values.secretInjection.secretKwargs }}
        {{ .kwarg }}: SECRET_INJECTION_SK_{{ .kwarg | upper }}
        {{- end }}
      {{- else }}
      secret_kwargs_env: {}
      {{- end }}

    auth_discovery:
      issuer: {{ .Values.authDiscovery.issuer | default "" | quote }}
      cli_client_id: {{ .Values.authDiscovery.cliClientId | default "volundr-cli" | quote }}
      scopes: {{ .Values.authDiscovery.scopes | default "openid profile email" | quote }}

    gateway:
      adapter: {{ .Values.gateway.adapter | quote }}
      kwargs: {{ .Values.gateway.kwargs | toJson }}
      {{- if .Values.gateway.secretKwargs }}
      secret_kwargs_env:
        {{- range .Values.gateway.secretKwargs }}
        {{ .kwarg }}: GATEWAY_SK_{{ .kwarg | upper }}
        {{- end }}
      {{- else }}
      secret_kwargs_env: {}
      {{- end }}

    {{- if and .Values.integrations .Values.integrations.definitions }}
    integrations:
      definitions:
        {{- range .Values.integrations.definitions }}
        - slug: {{ .slug | quote }}
          name: {{ .name | quote }}
          {{- if .description }}
          description: {{ .description | quote }}
          {{- end }}
          integration_type: {{ .integration_type | quote }}
          adapter: {{ .adapter | quote }}
          {{- if .icon }}
          icon: {{ .icon | quote }}
          {{- end }}
          {{- if .credential_schema }}
          credential_schema: {{ .credential_schema | toJson }}
          {{- end }}
          {{- if .config_schema }}
          config_schema: {{ .config_schema | toJson }}
          {{- end }}
          {{- if .mcp_server }}
          mcp_server: {{ .mcp_server | toJson }}
          {{- end }}
          {{- if .env_from_credentials }}
          env_from_credentials: {{ .env_from_credentials | toJson }}
          {{- end }}
          {{- if .file_mounts }}
          file_mounts: {{ .file_mounts | toJson }}
          {{- end }}
        {{- end }}
    {{- end }}

    {{- if .Values.oauth }}
    oauth:
      redirect_base_url: {{ .Values.oauth.redirectBaseUrl | default "" | quote }}
      {{- if .Values.oauth.clients }}
      clients:
        {{- range $slug, $client := .Values.oauth.clients }}
        {{ $slug }}:
          client_id: {{ $client.clientId | quote }}
          client_secret: {{ $client.clientSecret | quote }}
        {{- end }}
      {{- else }}
      clients: {}
      {{- end }}
    {{- end }}

    {{- if .Values.sessionContributors }}
    session_contributors:
      {{- range $i, $contributor := .Values.sessionContributors }}
      - adapter: {{ $contributor.adapter | quote }}
        kwargs: {{ $contributor.kwargs | default dict | toJson }}
        {{- if $contributor.secretKwargs }}
        secret_kwargs_env:
          {{- range $contributor.secretKwargs }}
          {{ .kwarg }}: SESSION_CONTRIBUTOR_{{ $i }}_SK_{{ .kwarg | upper }}
          {{- end }}
        {{- else }}
        secret_kwargs_env: {}
        {{- end }}
      {{- end }}
    {{- end }}
