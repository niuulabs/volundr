# CI smoke-test values — minimal config for kind cluster validation.
# Used by the helm-smoke-test CI job to verify charts install and pods start.

replicaCount: 1
revisionHistoryLimit: 1

image:
  registry: ghcr.io/niuulabs
  repository: tyr
  tag: ""  # overridden by CI to use PR-tagged image
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  automount: true

service:
  type: ClusterIP
  port: 80
  targetPort: 8081

ingress:
  enabled: false

config:
  logLevel: info
  logFormat: json
  host: "0.0.0.0"
  port: 8081
  workers: 1

database:
  name: tyr
  createSecret: true
  username: postgres
  password: test
  minPoolSize: 1
  maxPoolSize: 2
  external:
    enabled: true
    host: pg-postgresql.default.svc.cluster.local
    port: 5432

envoy:
  enabled: false

credentialStore:
  adapter: "niuu.adapters.memory_credential_store.MemoryCredentialStore"
  kwargs: {}

cerbos:
  url: "http://localhost:3592"

auth:
  patSigningKey: "ci-test-signing-key-not-for-production"
  patTtlDays: 1

volundr:
  url: "http://volundr:80"

migrations:
  enabled: false

livenessProbe:
  enabled: true
  path: "/health"
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  path: "/health"
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false
