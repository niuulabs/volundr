# Tyr — saga coordinator
# https://github.com/niuulabs/volundr

replicaCount: 1
revisionHistoryLimit: 10

image:
  registry: ghcr.io/niuulabs
  repository: tyr
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8081
  annotations: {}

ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name (nginx, traefik, haproxy, etc.)
  className: ""
  # -- Ingress annotations (controller-specific)
  annotations: {}
  # -- Ingress hosts
  # Note: Tyr API is served at /api/v1/tyr/* — these defaults ensure the
  # chart works out of the box without users needing to know the route prefix.
  hosts:
    - host: api.example.com
      paths:
        - path: /api/v1/tyr
          pathType: Prefix
  # -- TLS configuration
  tls: []

config:
  logLevel: "info"
  logFormat: "json"
  host: "0.0.0.0"
  port: 8081
  workers: 2
  extra: {}

# Dispatcher configuration
dispatch:
  # -- Default system prompt injected into every dispatched session
  defaultSystemPrompt: |
    You are a senior software engineer working on the Niuu platform.

    ## Workflow
    - You are working on a branch created from the feature branch specified in the task.
    - Create a new branch from the feature branch for your work.
    - When done, commit your changes and create a pull request against the feature branch (NOT main).
    - Ensure CI passes — all tests green, linting clean, coverage above 85%.
    - **You MUST NOT stop or exit the session until the PR is created AND all CI checks are green.**
    - If CI fails, investigate the failure, fix it, push again, and wait for CI to pass.

    ## Linear Ticket Management (via Linear MCP Server)
    You have access to the Linear MCP server tools. Use them to keep tickets in sync:
    - **When starting work**: Use the Linear MCP tools to set the linked ticket status to "In Progress".
    - **When PR is created**: Use the Linear MCP tools to:
      1. Add a comment on the ticket with a summary of the changes and a link to the PR.
      2. Set the ticket status to "In Review".
    - If you cannot update the ticket via MCP, note it in the PR description but do NOT let it block your work.

    ## Mandatory Exit Criteria
    The session must NOT exit until ALL of the following are true:
    1. A pull request has been created against the feature branch.
    2. All CI checks on the PR are green (tests, lint, coverage).
    3. The Linear ticket has been updated to "In Review" with a comment summarizing the work.
    If any of these are not met, keep working until they are.

    ## Code Style
    - Use early returns, no nested conditionals, no single-line else.
    - No magic numbers — use config with sensible defaults.
    - No inline styles, no Tailwind — CSS Modules with design tokens only.
    - Use --color-brand for primary UI elements, never hardcode colors.
    - Python 3.12+: use X | None, match statements, raw SQL with asyncpg (no ORM).
    - Conventional commits: feat|fix|refactor(scope): description

    ## Architecture
    - Hexagonal architecture: ports (interfaces) → adapters (implementations).
    - Tyr, Volundr, and Niuu are separate modules — never cross-import between Tyr and Volundr.
    - Shared code goes in the niuu module.
    - Dynamic adapter pattern: config specifies class path, kwargs forwarded.
    - No backwards-compatibility shims — just change the code.

    ## Testing
    - 85% coverage minimum for both backend and frontend.
    - Test against ports, mock infrastructure.
    - Run ruff check + ruff format before committing.
    - Zero warnings in pytest.
  # -- Default LLM model for dispatched sessions
  defaultModel: "claude-sonnet-4-6"

# Available AI models — overridden by global.models from the niuu umbrella chart
aiModels:
  - id: "claude-opus-4-6"
    name: "Opus 4.6"
  - id: "claude-sonnet-4-6"
    name: "Sonnet 4.6"
  - id: "claude-haiku-4-5-20251001"
    name: "Haiku 4.5"

database:
  name: tyr
  existingSecret: ""
  createSecret: false
  username: ""
  password: ""
  userKey: "username"
  passwordKey: "password"
  minPoolSize: 2
  maxPoolSize: 10
  external:
    enabled: false
    host: ""
    port: 5432

# Envoy sidecar proxy (JWT validation, header extraction)
envoy:
  # -- Enable Envoy sidecar proxy
  enabled: false
  image:
    # -- Envoy image repository
    repository: envoyproxy/envoy
    # -- Envoy image tag
    tag: "v1.32-latest"
    # -- Envoy image pull policy
    pullPolicy: IfNotPresent
  # -- Envoy listener port (becomes the service target when enabled)
  port: 8443
  # -- Envoy admin interface port (localhost only)
  adminPort: 9901
  # -- Upstream connect timeout
  connectTimeout: "0.25s"
  # -- Upstream request timeout
  upstreamTimeout: "60s"
  # -- Resource limits for the Envoy sidecar
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # -- Header names Envoy sets on upstream requests
  headerNames:
    userId: x-auth-user-id
    email: x-auth-email
    tenant: x-auth-tenant
    roles: x-auth-roles
  # JWT authentication (via Keycloak)
  jwt:
    # -- Enable JWT authentication filter
    enabled: false
    # -- JWT issuer URL (Keycloak realm)
    issuer: ""
    # -- Allowed JWT audiences
    audiences: []
    # -- JWKS URI for key retrieval
    jwksUri: ""
    # -- JWKS fetch timeout
    jwksTimeout: "5s"
    # -- JWKS cache duration in seconds
    jwksCacheDurationSeconds: 300
    # -- JWT claim containing tenant ID
    tenantClaim: "tenant_id"
    # -- JWT claim containing roles
    rolesClaim: "resource_access.tyr.roles"
    # -- Keycloak upstream host (for JWKS fetching)
    keycloakHost: ""
    # -- Keycloak upstream port
    keycloakPort: 8080
    # -- Enable TLS for Keycloak upstream
    keycloakTls: false
    # -- Additional JWT claim-to-header mappings
    extraClaimHeaders: []
    # -- Path prefixes that bypass JWT validation
    bypassPrefixes:
      - /health
  # -- Extra HTTP filters (inserted before the router filter)
  extraHttpFilters: []
  # -- Extra upstream clusters
  extraClusters: []

credentialStore:
  # -- Fully-qualified class path for the credential store adapter
  adapter: "niuu.adapters.memory_credential_store.MemoryCredentialStore"
  # -- Extra kwargs forwarded to the adapter constructor
  kwargs: {}
  # -- Secret kwargs: each entry injects a K8s secret value as an env var
  # Example:
  #   - kwarg: client_id
  #     secretName: infisical-auth
  #     secretKey: client-id
  secretKwargs: []

cerbos:
  # -- Cerbos authorization service URL
  url: "http://localhost:3592"

auth:
  # -- Symmetric signing key for PAT JWTs (same key Envoy uses for validation)
  patSigningKey: ""
  # -- Default PAT lifetime in days
  patTtlDays: 365

volundr:
  url: "http://volundr:8000"

migrations:
  enabled: true
  image:
    repository: migrate/migrate
    tag: "v4.18.3"
    pullPolicy: IfNotPresent
  resources: {}

livenessProbe:
  enabled: true
  path: "/health"
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  enabled: true
  path: "/health"
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  enabled: false
  path: "/health"
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 30

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}
deploymentAnnotations: {}
extraEnv: []
extraVolumeMounts: []
extraVolumes: []

global:
  imagePullSecrets: []
  image:
    registry: ""
