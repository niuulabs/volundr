apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tyr.fullname" . }}
  labels:
    {{- include "tyr.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | default "info" | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | default "json" | quote }}
  HOST: {{ .Values.config.host | default "0.0.0.0" | quote }}
  PORT: {{ .Values.service.targetPort | default 8000 | quote }}
  WORKERS: {{ .Values.config.workers | default 2 | quote }}
  {{- with .Values.config.extra }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}

  config.yaml: |
    # Tyr configuration (generated by Helm)

    logging:
      level: {{ .Values.config.logLevel | default "info" | quote }}
      format: {{ .Values.config.logFormat | default "json" | quote }}

    database:
      min_pool_size: {{ .Values.database.minPoolSize | default 2 }}
      max_pool_size: {{ .Values.database.maxPoolSize | default 10 }}

    volundr:
      url: {{ .Values.volundr.url | quote }}
