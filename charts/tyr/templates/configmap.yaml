apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tyr.fullname" . }}
  labels:
    {{- include "tyr.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | default "info" | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | default "json" | quote }}
  HOST: {{ .Values.config.host | default "0.0.0.0" | quote }}
  PORT: {{ .Values.service.targetPort | default 8000 | quote }}
  WORKERS: {{ .Values.config.workers | default 2 | quote }}
  {{- with .Values.config.extra }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}

  CERBOS__URL: {{ .Values.cerbos.url | default "http://localhost:3592" | quote }}

  config.yaml: |
    # Tyr configuration (generated by Helm)

    logging:
      level: {{ .Values.config.logLevel | default "info" | quote }}
      format: {{ .Values.config.logFormat | default "json" | quote }}

    database:
      min_pool_size: {{ .Values.database.minPoolSize | default 2 }}
      max_pool_size: {{ .Values.database.maxPoolSize | default 10 }}

    volundr:
      url: {{ .Values.volundr.url | quote }}

    dispatch:
      default_system_prompt: {{ .Values.dispatch.defaultSystemPrompt | quote }}
      default_model: {{ .Values.dispatch.defaultModel | quote }}
      {{- if .Values.dispatch.dispatchPromptTemplate }}
      dispatch_prompt_template: {{ .Values.dispatch.dispatchPromptTemplate | quote }}
      {{- end }}

    {{- if or .Values.planner .Values.review }}
    {{- with .Values.planner }}
    planner:
      {{- if .plannerSystemPrompt }}
      planner_system_prompt: {{ .plannerSystemPrompt | quote }}
      {{- end }}
      {{- if .finalizePrompt }}
      finalize_prompt: {{ .finalizePrompt | quote }}
      {{- end }}
    {{- end }}
    {{- end }}

    {{- with .Values.review }}
    review:
      {{- if .reviewerSystemPrompt }}
      reviewer_system_prompt: {{ .reviewerSystemPrompt | quote }}
      {{- end }}
      {{- if .reviewerInitialPromptTemplate }}
      reviewer_initial_prompt_template: {{ .reviewerInitialPromptTemplate | quote }}
      {{- end }}
      {{- if .reviewerModel }}
      reviewer_model: {{ .reviewerModel | quote }}
      {{- end }}
      {{- if .maxReviewRounds }}
      max_review_rounds: {{ .maxReviewRounds }}
      {{- end }}
      {{- if .autoApproveThreshold }}
      auto_approve_threshold: {{ .autoApproveThreshold }}
      {{- end }}
    {{- end }}
    ai_models:
      {{- $models := .Values.aiModels }}
      {{- if and .Values.global .Values.global.aiModels }}
      {{- $models = .Values.global.aiModels }}
      {{- end }}
      {{- range $models }}
      - id: {{ .id | quote }}
        name: {{ .name | quote }}
      {{- end }}

    cerbos:
      url: {{ .Values.cerbos.url | default "http://localhost:3592" | quote }}

    auth:
      pat_ttl_days: {{ .Values.auth.patTtlDays | default 365 }}

    credential_store:
      adapter: {{ .Values.credentialStore.adapter | quote }}
      kwargs: {{ .Values.credentialStore.kwargs | toJson }}
      {{- if .Values.credentialStore.secretKwargs }}
      secret_kwargs_env:
        {{- range .Values.credentialStore.secretKwargs }}
        {{ .kwarg }}: CREDENTIAL_STORE_SK_{{ .kwarg | upper }}
        {{- end }}
      {{- else }}
      secret_kwargs_env: {}
      {{- end }}
