{{- if .Values.flockFlows.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tyr.fullname" . }}-flock-flows
  labels:
    {{- include "tyr.labels" . | nindent 4 }}
    app.kubernetes.io/component: flock-flows
data:
  flows.yaml: |
    {{- if .Values.flockFlows.flows }}
    {{- .Values.flockFlows.flows | toYaml | nindent 4 }}
    {{- else }}
    []
    {{- end }}
{{- end }}
