{{- if .Values.migrations.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tyr.fullname" . }}-migrations
  labels:
    {{- include "tyr.labels" . | nindent 4 }}
data:
  000001_initial_schema.up.sql: |
    -- Initial schema for tyr saga coordinator

    CREATE TABLE IF NOT EXISTS sagas (
        id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        tracker_id    TEXT NOT NULL,
        tracker_type  TEXT NOT NULL,
        slug          TEXT NOT NULL UNIQUE,
        name          TEXT NOT NULL,
        repos         TEXT[] NOT NULL DEFAULT '{}',
        confidence    FLOAT DEFAULT 0,
        created_at    TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS phases (
        id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        saga_id       UUID NOT NULL REFERENCES sagas(id),
        tracker_id    TEXT NOT NULL,
        number        INT NOT NULL,
        name          TEXT NOT NULL,
        status        TEXT NOT NULL DEFAULT 'GATED',
        confidence    FLOAT DEFAULT 0
    );

    CREATE INDEX IF NOT EXISTS idx_phases_saga_id ON phases(saga_id);

    CREATE TABLE IF NOT EXISTS raids (
        id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        phase_id      UUID NOT NULL REFERENCES phases(id),
        tracker_id    TEXT NOT NULL,
        name          TEXT NOT NULL,
        declared_files TEXT[],
        estimate_hours FLOAT,
        status        TEXT NOT NULL DEFAULT 'PENDING',
        confidence    FLOAT DEFAULT 0,
        session_id    TEXT,
        branch        TEXT,
        chronicle_summary TEXT,
        retry_count   INT DEFAULT 0,
        created_at    TIMESTAMPTZ DEFAULT NOW(),
        updated_at    TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_raids_phase_id ON raids(phase_id);
    CREATE INDEX IF NOT EXISTS idx_raids_status ON raids(status);

    CREATE TABLE IF NOT EXISTS confidence_events (
        id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        raid_id       UUID NOT NULL REFERENCES raids(id),
        event_type    TEXT NOT NULL,
        delta         FLOAT NOT NULL,
        score_after   FLOAT NOT NULL,
        created_at    TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_confidence_events_raid_id ON confidence_events(raid_id);

    CREATE TABLE IF NOT EXISTS dispatcher_state (
        id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        running       BOOL DEFAULT TRUE,
        threshold     FLOAT DEFAULT 0.75,
        updated_at    TIMESTAMPTZ DEFAULT NOW()
    );

  000001_initial_schema.down.sql: |
    -- Rollback initial schema for tyr saga coordinator

    DROP TABLE IF EXISTS confidence_events;
    DROP TABLE IF EXISTS dispatcher_state;
    DROP TABLE IF EXISTS raids;
    DROP TABLE IF EXISTS phases;
    DROP TABLE IF EXISTS sagas;

  000002_integration_connections.up.sql: |
    -- Integration connections (shared table used by niuu adapters)

    CREATE TABLE IF NOT EXISTS integration_connections (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id VARCHAR(255) NOT NULL,
        integration_type VARCHAR(50) NOT NULL,
        adapter VARCHAR(500) NOT NULL,
        credential_name VARCHAR(253) NOT NULL,
        config JSONB NOT NULL DEFAULT '{}',
        enabled BOOLEAN NOT NULL DEFAULT true,
        slug VARCHAR(100) NOT NULL DEFAULT '',
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_integration_connections_user
        ON integration_connections(user_id, integration_type);

  000002_integration_connections.down.sql: |
    DROP TABLE IF EXISTS integration_connections;

  000003_saga_repos_array.up.sql: |
    -- Fix sagas table: rename repo→repos as array, add name and status columns
    ALTER TABLE sagas ADD COLUMN IF NOT EXISTS name TEXT NOT NULL DEFAULT '';
    ALTER TABLE sagas ADD COLUMN IF NOT EXISTS repos TEXT[] NOT NULL DEFAULT '{}';
    ALTER TABLE sagas ADD COLUMN IF NOT EXISTS status TEXT NOT NULL DEFAULT 'ACTIVE';
    UPDATE sagas SET repos = ARRAY[repo] WHERE repo IS NOT NULL AND repo != '';
    ALTER TABLE sagas DROP COLUMN IF EXISTS repo;

  000003_saga_repos_array.down.sql: |
    ALTER TABLE sagas ADD COLUMN IF NOT EXISTS repo TEXT NOT NULL DEFAULT '';
    UPDATE sagas SET repo = repos[1] WHERE array_length(repos, 1) > 0;
    ALTER TABLE sagas DROP COLUMN IF EXISTS repos;
    ALTER TABLE sagas DROP COLUMN IF EXISTS name;
    ALTER TABLE sagas DROP COLUMN IF EXISTS status;

  000004_owner_id_sagas.up.sql: |
    -- Add owner_id to sagas, rename user_id→owner_id on integration_connections

    ALTER TABLE sagas ADD COLUMN IF NOT EXISTS owner_id TEXT NOT NULL DEFAULT 'default';
    CREATE INDEX IF NOT EXISTS idx_sagas_owner_id ON sagas(owner_id);

    -- Align with Volundr convention (sessions.owner_id, workspaces FK, etc.)
    DO $$
    BEGIN
        IF EXISTS (
            SELECT 1 FROM information_schema.columns
            WHERE table_name = 'integration_connections' AND column_name = 'user_id'
        ) THEN
            ALTER TABLE integration_connections RENAME COLUMN user_id TO owner_id;
        END IF;
    END $$;

  000004_owner_id_sagas.down.sql: |
    -- Revert owner_id on sagas, restore user_id on integration_connections

    DO $$
    BEGIN
        IF EXISTS (
            SELECT 1 FROM information_schema.columns
            WHERE table_name = 'integration_connections' AND column_name = 'owner_id'
        ) THEN
            ALTER TABLE integration_connections RENAME COLUMN owner_id TO user_id;
        END IF;
    END $$;

    DROP INDEX IF EXISTS idx_sagas_owner_id;
    ALTER TABLE sagas DROP COLUMN IF EXISTS owner_id;

  000005_dispatcher_owner.up.sql: |
    -- Per-user dispatcher state: owner_id + max_concurrent_raids

    ALTER TABLE dispatcher_state ADD COLUMN IF NOT EXISTS owner_id TEXT NOT NULL DEFAULT 'default';
    ALTER TABLE dispatcher_state ADD COLUMN IF NOT EXISTS max_concurrent_raids INT NOT NULL DEFAULT 3;
    CREATE UNIQUE INDEX IF NOT EXISTS idx_dispatcher_state_owner ON dispatcher_state(owner_id);

  000005_dispatcher_owner.down.sql: |
    -- Revert per-user dispatcher state

    DROP INDEX IF EXISTS idx_dispatcher_state_owner;
    ALTER TABLE dispatcher_state DROP COLUMN IF EXISTS max_concurrent_raids;
    ALTER TABLE dispatcher_state DROP COLUMN IF EXISTS owner_id;

  000006_raid_pr_fields.up.sql: |
    -- PR tracking fields on raids

    ALTER TABLE raids ADD COLUMN IF NOT EXISTS pr_url TEXT;
    ALTER TABLE raids ADD COLUMN IF NOT EXISTS pr_id  TEXT;
    CREATE INDEX IF NOT EXISTS idx_raids_session_id ON raids(session_id)
        WHERE session_id IS NOT NULL;

  000006_raid_pr_fields.down.sql: |
    -- Revert PR tracking fields on raids

    DROP INDEX IF EXISTS idx_raids_session_id;
    ALTER TABLE raids DROP COLUMN IF EXISTS pr_id;
    ALTER TABLE raids DROP COLUMN IF EXISTS pr_url;

  000007_notification_subscriptions.up.sql: |
    -- Notification subscriptions table

    CREATE TABLE IF NOT EXISTS notification_subscriptions (
        id         UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        owner_id   TEXT        NOT NULL,
        channel    TEXT        NOT NULL,
        config     JSONB       NOT NULL DEFAULT '{}',
        enabled    BOOLEAN     NOT NULL DEFAULT true,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_notification_subs_owner
        ON notification_subscriptions(owner_id);

  000007_notification_subscriptions.down.sql: |
    -- Revert notification subscriptions

    DROP TABLE IF EXISTS notification_subscriptions;

  000008_personal_access_tokens.up.sql: |
    -- Personal access tokens for Tyr API callers (e.g. Telegram bot, ODIN/Móði)
    -- owner_id is the IDP sub claim from Envoy headers, treated as an opaque string.
    -- NOTE: Unlike Volundr's PAT table, there is no FK on owner_id because Tyr does
    -- not own a users table. owner_id is validated at the application layer via the
    -- IDP subject claim propagated through Envoy.

    CREATE TABLE IF NOT EXISTS personal_access_tokens (
        id           UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        owner_id     TEXT        NOT NULL,
        name         TEXT        NOT NULL,
        token_hash   TEXT        NOT NULL,
        created_at   TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        expires_at   TIMESTAMPTZ,
        last_used_at TIMESTAMPTZ
    );

    CREATE INDEX IF NOT EXISTS idx_pats_owner_id ON personal_access_tokens(owner_id);

  000008_personal_access_tokens.down.sql: |
    DROP TABLE IF EXISTS personal_access_tokens;

  000009_pat_unique_owner_name.up.sql: |
    -- Enforce one PAT name per owner
    CREATE UNIQUE INDEX IF NOT EXISTS idx_pats_owner_name ON personal_access_tokens(owner_id, name);

  000009_pat_unique_owner_name.down.sql: |
    DROP INDEX IF EXISTS idx_pats_owner_name;

  000010_saga_base_branch.up.sql: |
    -- Add base_branch column to sagas
    ALTER TABLE sagas ADD COLUMN IF NOT EXISTS base_branch TEXT NOT NULL DEFAULT 'main';

  000010_saga_base_branch.down.sql: |
    ALTER TABLE sagas DROP COLUMN IF EXISTS base_branch;

  000011_raids_reason_column.up.sql: |
    -- Add reason column to raids for reject context
    ALTER TABLE raids ADD COLUMN IF NOT EXISTS reason TEXT;

  000011_raids_reason_column.down.sql: |
    ALTER TABLE raids DROP COLUMN IF EXISTS reason;

  000012_raid_description.up.sql: |
    -- Add description and acceptance_criteria columns to raids for NativeAdapter
    ALTER TABLE raids ADD COLUMN IF NOT EXISTS description TEXT NOT NULL DEFAULT '';
    ALTER TABLE raids ADD COLUMN IF NOT EXISTS acceptance_criteria TEXT[] NOT NULL DEFAULT '{}';

  000012_raid_description.down.sql: |
    ALTER TABLE raids DROP COLUMN IF EXISTS acceptance_criteria;
    ALTER TABLE raids DROP COLUMN IF EXISTS description;

  000013_raids_status_index.up.sql: |
    CREATE INDEX IF NOT EXISTS idx_raids_status ON raids (status);

  000013_raids_status_index.down.sql: |
    DROP INDEX IF EXISTS idx_raids_status;

  000014_raid_pr_columns.up.sql: |
    ALTER TABLE raids ADD COLUMN IF NOT EXISTS pr_url TEXT;
    ALTER TABLE raids ADD COLUMN IF NOT EXISTS pr_id TEXT;
    CREATE INDEX IF NOT EXISTS idx_raids_session_id ON raids(session_id) WHERE session_id IS NOT NULL;

  000014_raid_pr_columns.down.sql: |
    DROP INDEX IF EXISTS idx_raids_session_id;
    ALTER TABLE raids DROP COLUMN IF EXISTS pr_id;
    ALTER TABLE raids DROP COLUMN IF EXISTS pr_url;

  000015_session_messages.up.sql: |
    CREATE TABLE IF NOT EXISTS session_messages (
        id          UUID PRIMARY KEY,
        raid_id     UUID NOT NULL REFERENCES raids(id),
        session_id  TEXT NOT NULL,
        content     TEXT NOT NULL,
        sender      TEXT NOT NULL DEFAULT 'user',
        created_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE INDEX IF NOT EXISTS idx_session_messages_raid_id
        ON session_messages (raid_id);

    CREATE INDEX IF NOT EXISTS idx_session_messages_session_id
        ON session_messages (session_id);

  000015_session_messages.down.sql: |
    DROP TABLE IF EXISTS session_messages;

  000016_raid_progress.up.sql: |
    DROP TABLE IF EXISTS dispatched_sessions;

    CREATE TABLE IF NOT EXISTS raid_progress (
        tracker_id          TEXT PRIMARY KEY,
        raid_id             UUID NOT NULL DEFAULT gen_random_uuid(),
        owner_id            TEXT,
        phase_tracker_id    TEXT,
        saga_tracker_id     TEXT,
        status              TEXT NOT NULL DEFAULT 'PENDING',
        session_id          TEXT,
        confidence          FLOAT DEFAULT 0,
        pr_url              TEXT,
        pr_id               TEXT,
        retry_count         INT DEFAULT 0,
        reason              TEXT,
        chronicle_summary   TEXT,
        updated_at          TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_raid_progress_status ON raid_progress(status);
    CREATE INDEX IF NOT EXISTS idx_raid_progress_session ON raid_progress(session_id) WHERE session_id IS NOT NULL;
    CREATE INDEX IF NOT EXISTS idx_raid_progress_raid_id ON raid_progress(raid_id);
    CREATE INDEX IF NOT EXISTS idx_raid_progress_phase ON raid_progress(phase_tracker_id) WHERE phase_tracker_id IS NOT NULL;

    CREATE TABLE IF NOT EXISTS raid_confidence_events (
        id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        raid_id     UUID NOT NULL,
        tracker_id  TEXT NOT NULL,
        event_type  TEXT NOT NULL,
        delta       FLOAT NOT NULL,
        score_after FLOAT NOT NULL,
        created_at  TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_raid_confidence_events_tracker ON raid_confidence_events(tracker_id);

    CREATE TABLE IF NOT EXISTS raid_session_messages (
        id          UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        raid_id     UUID NOT NULL,
        tracker_id  TEXT NOT NULL,
        session_id  TEXT NOT NULL,
        content     TEXT NOT NULL,
        sender      TEXT NOT NULL DEFAULT 'user',
        created_at  TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_raid_session_messages_tracker ON raid_session_messages(tracker_id);
    CREATE INDEX IF NOT EXISTS idx_raid_session_messages_session ON raid_session_messages(session_id);

  000016_raid_progress.down.sql: |
    DROP TABLE IF EXISTS raid_session_messages;
    DROP TABLE IF EXISTS raid_confidence_events;
    DROP TABLE IF EXISTS raid_progress;

    CREATE TABLE IF NOT EXISTS dispatched_sessions (
        id                UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        session_id        TEXT NOT NULL UNIQUE,
        owner_id          TEXT NOT NULL,
        saga_id           UUID NOT NULL,
        tracker_issue_id  TEXT NOT NULL,
        status            TEXT NOT NULL DEFAULT 'running',
        created_at        TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_dispatched_sessions_status ON dispatched_sessions(status);
    CREATE INDEX IF NOT EXISTS idx_dispatched_sessions_owner  ON dispatched_sessions(owner_id);
{{- end }}
