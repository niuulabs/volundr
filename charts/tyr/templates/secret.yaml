{{- if and (not .Values.database.existingSecret) .Values.database.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tyr.databaseSecretName" . }}
  labels:
    {{- include "tyr.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.database.username }}
  username: {{ .Values.database.username | b64enc | quote }}
  {{- end }}
  {{- if .Values.database.password }}
  password: {{ .Values.database.password | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- $patKey := .Values.auth.patSigningKey -}}
{{- if and .Values.global .Values.global.auth .Values.global.auth.patSigningKey -}}
  {{- $patKey = .Values.global.auth.patSigningKey -}}
{{- end -}}
{{- if $patKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tyr.fullname" . }}-auth
  labels:
    {{- include "tyr.labels" . | nindent 4 }}
type: Opaque
data:
  pat-signing-key: {{ $patKey | b64enc | quote }}
{{- end }}
