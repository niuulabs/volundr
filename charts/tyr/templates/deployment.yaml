apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tyr.fullname" . }}
  labels:
    {{- include "tyr.labels" . | nindent 4 }}
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit | default 10 }}
  selector:
    matchLabels:
      {{- include "tyr.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "tyr.checksumAnnotations" . | nindent 8 }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "tyr.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "tyr.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "tyr.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "tyr.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort | default 8000 }}
              protocol: TCP
          env:
            - name: DATABASE__HOST
              value: {{ include "tyr.databaseHost" . | quote }}
            - name: DATABASE__PORT
              value: {{ include "tyr.databasePort" . | quote }}
            - name: DATABASE__NAME
              value: {{ .Values.database.name | quote }}
            - name: DATABASE__USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "tyr.databaseSecretName" . }}
                  key: {{ .Values.database.userKey | default "username" }}
            - name: DATABASE__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tyr.databaseSecretName" . }}
                  key: {{ .Values.database.passwordKey | default "password" }}
            - name: VOLUNDR_URL
              value: {{ .Values.volundr.url | quote }}
            {{- if or .Values.auth.patSigningKey (and .Values.global .Values.global.auth .Values.global.auth.patSigningKey) }}
            - name: PAT__SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tyr.fullname" . }}-auth
                  key: pat-signing-key
            {{- end }}
            {{- range .Values.credentialStore.secretKwargs }}
            - name: CREDENTIAL_STORE_SK_{{ .kwarg | upper }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default 30 }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default 10 }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 3 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold | default 3 }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold | default 30 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/tyr
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if .Values.envoy.enabled }}
        - name: envoy
          image: "{{ .Values.envoy.image.repository }}:{{ .Values.envoy.image.tag }}"
          imagePullPolicy: {{ .Values.envoy.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - name: envoy
              containerPort: {{ .Values.envoy.port }}
              protocol: TCP
          {{- with .Values.envoy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: {{ .Values.envoy.port }}
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ .Values.envoy.port }}
            initialDelaySeconds: 5
            periodSeconds: 15
        {{- end }}
      {{- if .Values.migrations.enabled }}
      initContainers:
        - name: migrate
          image: "{{ .Values.migrations.image.repository }}:{{ .Values.migrations.image.tag }}"
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          args:
            - "-path=/migrations"
            - "-database=postgres://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)?sslmode=disable"
            - "up"
          env:
            - name: DATABASE_HOST
              value: {{ include "tyr.databaseHost" . | quote }}
            - name: DATABASE_PORT
              value: {{ include "tyr.databasePort" . | quote }}
            - name: DATABASE_NAME
              value: {{ .Values.database.name | quote }}
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "tyr.databaseSecretName" . }}
                  key: {{ .Values.database.userKey | default "username" }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tyr.databaseSecretName" . }}
                  key: {{ .Values.database.passwordKey | default "password" }}
          {{- with .Values.migrations.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "tyr.fullname" . }}
        {{- if .Values.envoy.enabled }}
        - name: envoy-config
          configMap:
            name: {{ include "tyr.fullname" . }}-envoy
        {{- end }}
        {{- if .Values.migrations.enabled }}
        - name: migrations
          configMap:
            name: {{ include "tyr.fullname" . }}-migrations
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
