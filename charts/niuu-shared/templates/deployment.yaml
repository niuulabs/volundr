apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "niuu-shared.fullname" . }}
  labels:
    {{- include "niuu-shared.labels" . | nindent 4 }}
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit | default 10 }}
  selector:
    matchLabels:
      {{- include "niuu-shared.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "niuu-shared.checksumAnnotations" . | nindent 8 }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "niuu-shared.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "niuu-shared.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "niuu-shared.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "niuu-shared.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort | default 8082 }}
              protocol: TCP
          env:
            - name: NIUU_CONFIG
              value: "/etc/niuu/config.yaml"
            {{- if .Values.git.github.existingSecret }}
            - name: GIT__GITHUB__TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.git.github.existingSecret }}
                  key: {{ .Values.git.github.tokenKey | default "token" }}
            {{- end }}
            {{- if .Values.git.gitlab.existingSecret }}
            - name: GIT__GITLAB__TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.git.gitlab.existingSecret }}
                  key: {{ .Values.git.gitlab.tokenKey | default "token" }}
            {{- end }}
            {{- range $i, $inst := .Values.git.github.instances }}
            {{- if $inst.existingSecret }}
            - name: GIT_GITHUB_INSTANCE_{{ $i }}_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $inst.existingSecret }}
                  key: {{ $inst.tokenKey | default "token" }}
            {{- end }}
            {{- end }}
            {{- range $i, $inst := .Values.git.gitlab.instances }}
            {{- if $inst.existingSecret }}
            - name: GIT_GITLAB_INSTANCE_{{ $i }}_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $inst.existingSecret }}
                  key: {{ $inst.tokenKey | default "token" }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default 30 }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default 10 }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 3 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds | default 3 }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold | default 3 }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.path | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds | default 3 }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold | default 30 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/niuu
              readOnly: true
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "niuu-shared.fullname" . }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
