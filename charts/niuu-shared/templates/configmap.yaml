apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "niuu-shared.fullname" . }}
  labels:
    {{- include "niuu-shared.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | default "info" | quote }}
  LOG_FORMAT: {{ .Values.config.logFormat | default "json" | quote }}
  HOST: {{ .Values.config.host | default "0.0.0.0" | quote }}
  PORT: {{ .Values.service.targetPort | default 8082 | quote }}
  {{- with .Values.config.extra }}
  {{- range $key, $value := . }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}

  config.yaml: |
    # Niuu shared services configuration (generated by Helm)

    git:
      github:
        enabled: {{ .Values.git.github.enabled }}
        base_url: "https://api.github.com"
        {{- if .Values.git.github.instances }}
        instances:
          {{- range $i, $inst := .Values.git.github.instances }}
          - name: {{ $inst.name | quote }}
            base_url: {{ $inst.baseUrl | default "https://api.github.com" | quote }}
            {{- if $inst.existingSecret }}
            token_env: GIT_GITHUB_INSTANCE_{{ $i }}_TOKEN
            {{- end }}
            {{- if $inst.orgs }}
            orgs:
              {{- range $inst.orgs }}
              - {{ . | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- else }}
        instances: []
        {{- end }}
      gitlab:
        enabled: {{ .Values.git.gitlab.enabled }}
        base_url: "https://gitlab.com"
        {{- if .Values.git.gitlab.instances }}
        instances:
          {{- range $i, $inst := .Values.git.gitlab.instances }}
          - name: {{ $inst.name | quote }}
            base_url: {{ $inst.baseUrl | default "https://gitlab.com" | quote }}
            {{- if $inst.existingSecret }}
            token_env: GIT_GITLAB_INSTANCE_{{ $i }}_TOKEN
            {{- end }}
            {{- if $inst.orgs }}
            orgs:
              {{- range $inst.orgs }}
              - {{ . | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- else }}
        instances: []
        {{- end }}
