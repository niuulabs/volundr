# Niuu — shared platform services
# https://github.com/niuulabs/volundr

replicaCount: 1
revisionHistoryLimit: 10

image:
  registry: ghcr.io/niuulabs
  repository: niuu
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8082
  annotations: {}

ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name (nginx, traefik, haproxy, etc.)
  className: ""
  # -- Ingress annotations (controller-specific)
  annotations: {}
  # -- Ingress hosts
  hosts:
    - host: api.example.com
      paths:
        - path: /api/v1/niuu
          pathType: Prefix
  # -- TLS configuration
  tls: []

config:
  logLevel: "info"
  logFormat: "json"
  host: "0.0.0.0"
  port: 8082
  extra: {}

# Git provider configuration
git:
  github:
    enabled: false
    instances: []
    # -- Existing K8s secret with the default GitHub token
    existingSecret: ""
    # -- Key in existingSecret containing the token
    tokenKey: "token"
  gitlab:
    enabled: false
    instances: []
    # -- Existing K8s secret with the default GitLab token
    existingSecret: ""
    # -- Key in existingSecret containing the token
    tokenKey: "token"

livenessProbe:
  enabled: true
  path: "/health"
  initialDelaySeconds: 5
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  enabled: true
  path: "/health"
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  enabled: false
  path: "/health"
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 30

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}
deploymentAnnotations: {}
extraEnv: []
extraVolumeMounts: []
extraVolumes: []

global:
  imagePullSecrets: []
  image:
    registry: ""
