apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mimir.fullname" . }}
  labels:
    {{- include "mimir.labels" . | nindent 4 }}
data:
  # Instance metadata — used by the deployment args and Sleipnir announce
  MIMIR_NAME: {{ .Values.config.name | default "local" | quote }}
  MIMIR_ROLE: {{ .Values.config.role | default "local" | quote }}
  MIMIR_DATA_PATH: {{ .Values.config.dataPath | default "/data/mimir" | quote }}
  MIMIR_PORT: {{ .Values.config.port | default 7477 | quote }}
  {{- if .Values.config.announceUrl }}
  MIMIR_ANNOUNCE_URL: {{ .Values.config.announceUrl | quote }}
  {{- end }}
  {{- if .Values.config.categories }}
  MIMIR_CATEGORIES: {{ .Values.config.categories | join "," | quote }}
  {{- end }}
