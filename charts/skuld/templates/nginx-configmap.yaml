apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "skuld.fullname" . }}-nginx
  labels:
    {{- include "skuld.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 256;
    }

    http {
        access_log /dev/stdout;

        # Temp paths writable by non-root
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path /tmp/proxy_temp;
        fastcgi_temp_path /tmp/fastcgi_temp;
        uwsgi_temp_path /tmp/uwsgi_temp;
        scgi_temp_path /tmp/scgi_temp;

        # Timeouts for long-running connections (WebSocket)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;

        # File upload support
        client_max_body_size 100m;

        # Upstream definitions - static backends
        upstream broker {
            server 127.0.0.1:8081;
        }

        {{- if .Values.codeServer.enabled }}
        upstream codeserver {
            server 127.0.0.1:{{ .Values.codeServer.port }};
        }
        {{- end }}

        server {
            listen 8080;
            server_name _;

            # Broker: WebSocket session endpoint
            location = {{ .Values.ingress.paths.session }} {
                proxy_pass http://broker{{ .Values.ingress.paths.session }};
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
            location {{ .Values.ingress.paths.session }}/ {
                proxy_pass http://broker{{ .Values.ingress.paths.session }}/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Broker: REST API endpoints
            location = /api {
                return 301 /api/;
            }
            location /api/ {
                proxy_pass http://broker/api/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            # Broker: health and readiness (for probes)
            location /health {
                proxy_pass http://broker/health;
            }

            location /ready {
                proxy_pass http://broker/ready;
            }

            {{- if and .Values.codeServer.enabled (ne .Values.ingress.paths.ide "/") }}
            # code-server: VS Code IDE (sub-path)
            location {{ .Values.ingress.paths.ide }}/ {
                proxy_pass http://codeserver{{ .Values.ingress.paths.ide }}/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Accept-Encoding gzip;
            }
            {{- end }}

            {{- if and .Values.localServices.enabled .Values.localServices.terminal.debug }}
            # Debug terminal UI - serve single page directly at /debug
            location = /debug {
                alias /etc/terminal-debug/index.html;
                default_type text/html;
                add_header Cache-Control "no-cache";
            }
            location = /debug/ {
                return 301 /debug;
            }
            {{- end }}

            {{- if .Values.localServices.enabled }}
            # Terminal: WebSocket PTY with restricted shell
            location = /terminal {
                return 301 /terminal/;
            }
            location /terminal/ {
                proxy_pass http://127.0.0.1:{{ .Values.localServices.terminal.port }}/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_read_timeout 3600s;
                proxy_send_timeout 3600s;
            }

            # Dynamic local services - config generated by devrunner
            include {{ .Values.persistence.mountPath }}/{{ .Values.session.id }}/workspace/.services/nginx.conf;

            # Service listing fallback when no services configured
            location = /svc {
                return 301 /svc/;
            }
            location /svc/ {
                default_type application/json;
                return 200 '{"services":[],"hint":"use svc start to add services","postgres":"postgresql://127.0.0.1:5432/postgres"}';
            }
            {{- end }}

            # Default catch-all
            location / {
                {{- if and .Values.codeServer.enabled (eq .Values.ingress.paths.ide "/") }}
                # VS Code IDE at root - IDE is the default handler
                proxy_pass http://codeserver/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Accept-Encoding gzip;
                {{- if eq (toString .Values.codeServer.backend) "openvscode" }}
                # Forward WebSocket subprotocol headers for VS Code Web workbench
                # VS Code uses Sec-WebSocket-Protocol: vscode-tkn-<token> for auth
                proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
                {{- end }}
                {{- else }}
                proxy_pass http://broker/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                {{- end }}
            }
        }
    }
