name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]  # stable semver only, skip prerelease (v*-dev.*)

permissions: read-all

env:
  REGISTRY: ghcr.io
  CHART_REPO: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  # Extract version from the tag — single source of truth
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Extract version from tag
        id: extract
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

  # ---------------------------------------------------------------------------
  # Containers — build per platform natively, then merge manifests
  # ---------------------------------------------------------------------------
  build-container-image:
    name: "Build ${{ matrix.container }} (${{ matrix.platform }})"
    needs: [version]
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [amd64, arm64]
        container: [volundr, skuld, skuld-codex, devrunner, volundr-web, vscode-reh]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image description from Dockerfile
        id: meta
        run: |
          DESC=$(grep 'org.opencontainers.image.description=' \
            ./containers/${{ matrix.container }}/Dockerfile \
            | head -1 | sed 's/.*description="\(.*\)"/\1/')
          echo "description=${DESC}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}:${{ needs.version.outputs.version }}-${{ matrix.platform }}
          build-args: |
            APP_VERSION=${{ needs.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=${{ matrix.container }}
            org.opencontainers.image.description=${{ steps.meta.outputs.description }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=Niuu Labs
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.container }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.container }}-${{ matrix.platform }}
          platforms: linux/${{ matrix.platform }}
          provenance: false

  merge-container-manifests:
    name: "Manifest ${{ matrix.container }}"
    needs: [version, build-container-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        container: [volundr, skuld, skuld-codex, devrunner, volundr-web, vscode-reh]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: containers/${{ matrix.container }}/Dockerfile
          sparse-checkout-cone-mode: false

      - name: Extract image description from Dockerfile
        id: meta
        run: |
          DESC=$(grep 'org.opencontainers.image.description=' \
            ./containers/${{ matrix.container }}/Dockerfile \
            | head -1 | sed 's/.*description="\(.*\)"/\1/')
          echo "description=${DESC}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}"
          VERSION="${{ needs.version.outputs.version }}"

          ANNOTATIONS=(
            --annotation "index:org.opencontainers.image.title=${{ matrix.container }}"
            --annotation "index:org.opencontainers.image.description=${{ steps.meta.outputs.description }}"
            --annotation "index:org.opencontainers.image.licenses=Apache-2.0"
            --annotation "index:org.opencontainers.image.vendor=Niuu Labs"
            --annotation "index:org.opencontainers.image.source=https://github.com/${{ github.repository }}"
            --annotation "index:org.opencontainers.image.documentation=https://github.com/${{ github.repository }}"
            --annotation "index:org.opencontainers.image.version=${VERSION}"
          )

          # versioned tag
          docker buildx imagetools create "${ANNOTATIONS[@]}" \
            -t "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

          # latest
          docker buildx imagetools create "${ANNOTATIONS[@]}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

      - name: Install cosign
        run: |
          COSIGN_VERSION="2.4.3"
          curl -sSfL "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-amd64" -o /usr/local/bin/cosign
          echo "caaad125acef1cb81d58dcdc454a1e429d09a750d1e9e2b3ed1aed8964454708  /usr/local/bin/cosign" | sha256sum -c -
          chmod +x /usr/local/bin/cosign
          cosign version

      - name: Sign container image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}"
          VERSION="${{ needs.version.outputs.version }}"
          cosign sign --yes "${IMAGE}:${VERSION}"

  # Scan and generate SBOMs after manifests are published
  scan-containers:
    name: "Scan ${{ matrix.container }}"
    needs: [version, merge-container-manifests]
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    strategy:
      matrix:
        container: [volundr, skuld, skuld-codex, devrunner, volundr-web, vscode-reh]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft
        run: |
          SYFT_VERSION="1.22.0"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/9ab83874ed21c07479d8eeddd88a6894e1ff8537/install.sh | sh -s -- -b /usr/local/bin "v${SYFT_VERSION}"
          syft version

      - name: Generate SBOM
        run: |
          syft "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}:${{ needs.version.outputs.version }}" \
            -o spdx-json > "sbom-${{ matrix.container }}.spdx.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom-${{ matrix.container }}.spdx.json
          path: sbom-${{ matrix.container }}.spdx.json

      - name: Install Grype
        run: |
          GRYPE_VERSION="0.87.0"
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/247f5d72abf2131aa37f3164a98495c121b29029/install.sh | sh -s -- -b /usr/local/bin "v${GRYPE_VERSION}"
          grype version

      - name: Scan container with Grype
        run: |
          grype "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}:${{ needs.version.outputs.version }}" \
            --only-fixed \
            --fail-on critical \
            -o sarif > "grype-${{ matrix.container }}.sarif"

      - name: Upload Grype results
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        if: always()
        with:
          sarif_file: grype-${{ matrix.container }}.sarif
          category: grype-${{ matrix.container }}

  # ---------------------------------------------------------------------------
  # CLI binaries
  # ---------------------------------------------------------------------------
  build-cli:
    name: Build CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: [version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web && npm ci --ignore-scripts && npm run build
          cd ..
          rm -rf cli/internal/web/dist
          cp -r web/dist cli/internal/web/dist

      - name: Build CLI
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          BINARY="niuu-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -tags embed_web \
            -ldflags "-s -w -X github.com/niuulabs/volundr/cli/internal/cli.Version=${VERSION}" \
            -o "dist/${BINARY}" ./cmd/niuu

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: niuu-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/dist/niuu-${{ matrix.goos }}-${{ matrix.goarch }}

  # ---------------------------------------------------------------------------
  # Helm charts
  # ---------------------------------------------------------------------------
  build-charts:
    name: Build Helm Charts
    needs: [version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        run: |
          HELM_VERSION="3.14.0"
          curl -sSfL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          echo "f43e1c3387de24547506ab05d24e5309c0ce0b228c23bd8aa64e9ec4b8206651  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp
          mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Update chart versions
        run: |
          VERSION="${{ needs.version.outputs.version }}"

          # Update skuld chart
          sed -i "s/^version:.*/version: $VERSION/" charts/skuld/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/skuld/Chart.yaml

          # Update volundr chart
          sed -i "s/^version:.*/version: $VERSION/" charts/volundr/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/volundr/Chart.yaml

          # Update tyr chart
          sed -i "s/^version:.*/version: $VERSION/" charts/tyr/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/tyr/Chart.yaml

          # Update skuld-planner chart
          sed -i "s/^version:.*/version: $VERSION/" charts/skuld-planner/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/skuld-planner/Chart.yaml

          # Update niuu umbrella chart
          sed -i "s/^version:.*/version: $VERSION/" charts/niuu/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/niuu/Chart.yaml

          # Update pyproject.toml
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Package Helm charts
        run: |
          helm package charts/skuld -d .helm-packages/
          helm package charts/skuld-planner -d .helm-packages/
          helm package charts/volundr -d .helm-packages/
          helm package charts/tyr -d .helm-packages/
          helm dependency build charts/niuu
          helm package charts/niuu -d .helm-packages/

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm charts to OCI registry
        run: |
          helm push .helm-packages/skuld-0*.tgz ${{ env.CHART_REPO }}
          helm push .helm-packages/skuld-planner-*.tgz ${{ env.CHART_REPO }}
          helm push .helm-packages/volundr-*.tgz ${{ env.CHART_REPO }}
          helm push .helm-packages/tyr-*.tgz ${{ env.CHART_REPO }}
          helm push .helm-packages/niuu-*.tgz ${{ env.CHART_REPO }}

  # ---------------------------------------------------------------------------
  # npm package
  # ---------------------------------------------------------------------------
  publish-web-package:
    name: Publish Web Package
    needs: [version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: web
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Update package version
        run: npm version ${{ needs.version.outputs.version }} --no-git-tag-version

      - name: Build library
        run: npm run build:lib
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    needs: [version, merge-container-manifests, scan-containers, build-charts, build-cli, publish-web-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: cli-binaries
          pattern: niuu-*

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in cli-binaries/niuu-*/; do
            binary=$(basename "$dir")
            cp "${dir}${binary}" "release-assets/${binary}"
            chmod +x "release-assets/${binary}"
          done
          cd release-assets && sha256sum niuu-* > checksums.txt
          ls -lh

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: release-assets/niuu-*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.version.outputs.version }}" \
            --title "Release v${{ needs.version.outputs.version }}" \
            --generate-notes \
            release-assets/niuu-* \
            release-assets/checksums.txt
