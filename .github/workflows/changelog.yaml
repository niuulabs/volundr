# Auto-generates a changelog for PRs merging dev → main.
# Parses conventional commit subjects (skipping merges) to categorize
# changes and predict the next semver version.
name: Changelog

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  pull-requests: write

jobs:
  changelog:
    name: Generate Changelog
    if: github.head_ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Generate changelog from conventional commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # ---------------------------------------------------------------------------
          # Determine version
          # ---------------------------------------------------------------------------
          LAST_TAG=$(git describe --tags --match "v[0-9]*.[0-9]*.[0-9]*" --abbrev=0 origin/main 2>/dev/null || echo "v0.0.0")
          LAST_VERSION=${LAST_TAG#v}

          # Get merge base between main and dev
          BASE=$(git merge-base origin/main HEAD)

          # Collect commit subjects, skipping merge commits — same logic as release-tag.yaml
          SUBJECTS=$(git log --no-merges --pretty=format:"%s" "${BASE}..HEAD")

          # Determine version bump
          VERSION_TYPE="none"
          if echo "$SUBJECTS" | grep -qiE "^feat(\(.+\))?!:|^BREAKING CHANGE:"; then
            VERSION_TYPE="major"
          elif echo "$SUBJECTS" | grep -qiE "^(feat|refactor)(\(.+\))?:"; then
            VERSION_TYPE="minor"
          elif echo "$SUBJECTS" | grep -qiE "^(fix|style)(\(.+\))?:"; then
            VERSION_TYPE="patch"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
          case $VERSION_TYPE in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            *)     NEW_VERSION="${LAST_VERSION} (no bump)" ;;
          esac

          # ---------------------------------------------------------------------------
          # Categorize commits
          # ---------------------------------------------------------------------------
          declare -a FEATS FIXES REFACTORS PERFS SECURITY CI BUILD DOCS STYLES TESTS CHORES

          while IFS= read -r line; do
            [[ -z "$line" ]] && continue

            # Strip PR number suffix like (#123)
            clean=$(echo "$line" | sed 's/ (#[0-9]*)$//')

            # Extract type and description
            if [[ "$clean" =~ ^([a-z]+)(\([^)]*\))?!?:[[:space:]]*(.+)$ ]]; then
              type="${BASH_REMATCH[1]}"
              scope="${BASH_REMATCH[2]}"
              desc="${BASH_REMATCH[3]}"
              # Capitalize first letter of description
              desc="$(echo "${desc:0:1}" | tr '[:lower:]' '[:upper:]')${desc:1}"
              entry="- ${desc}"
              if [[ -n "$scope" ]]; then
                scope_clean="${scope#(}"
                scope_clean="${scope_clean%)}"
                entry="- **${scope_clean}**: ${desc}"
              fi
            else
              entry="- ${clean}"
              type="chore"
            fi

            case "$type" in
              feat)     FEATS+=("$entry") ;;
              fix)      FIXES+=("$entry") ;;
              refactor) REFACTORS+=("$entry") ;;
              perf)     PERFS+=("$entry") ;;
              security) SECURITY+=("$entry") ;;
              ci)       CI+=("$entry") ;;
              build)    BUILD+=("$entry") ;;
              docs)     DOCS+=("$entry") ;;
              style)    STYLES+=("$entry") ;;
              test)     TESTS+=("$entry") ;;
              chore)    CHORES+=("$entry") ;;
              *)        CHORES+=("$entry") ;;
            esac
          done <<< "$SUBJECTS"

          # ---------------------------------------------------------------------------
          # Build changelog body
          # ---------------------------------------------------------------------------
          BODY=""
          add_section() {
            local title="$1"
            shift
            local -a items=("$@")
            if [[ ${#items[@]} -gt 0 ]]; then
              BODY+="### ${title}"$'\n'
              for item in "${items[@]}"; do
                BODY+="${item}"$'\n'
              done
              BODY+=$'\n'
            fi
          }

          add_section "Features"      "${FEATS[@]+"${FEATS[@]}"}"
          add_section "Bug Fixes"     "${FIXES[@]+"${FIXES[@]}"}"
          add_section "Security"      "${SECURITY[@]+"${SECURITY[@]}"}"
          add_section "Refactoring"   "${REFACTORS[@]+"${REFACTORS[@]}"}"
          add_section "Performance"   "${PERFS[@]+"${PERFS[@]}"}"
          add_section "CI"            "${CI[@]+"${CI[@]}"}"
          add_section "Build"         "${BUILD[@]+"${BUILD[@]}"}"
          add_section "Documentation" "${DOCS[@]+"${DOCS[@]}"}"
          add_section "Tests"         "${TESTS[@]+"${TESTS[@]}"}"
          add_section "Styles"        "${STYLES[@]+"${STYLES[@]}"}"
          add_section "Chores"        "${CHORES[@]+"${CHORES[@]}"}"

          TOTAL=$(echo "$SUBJECTS" | grep -c . || true)

          # ---------------------------------------------------------------------------
          # Update PR
          # ---------------------------------------------------------------------------
          PR_BODY="## Release v${NEW_VERSION}

          **${TOTAL}** commits since v${LAST_VERSION} · version bump: **${VERSION_TYPE}**

          ${BODY}---
          *Auto-generated by the changelog workflow*"

          # Strip leading whitespace from heredoc indentation
          PR_BODY=$(echo "$PR_BODY" | sed 's/^          //')

          gh pr edit "${{ github.event.pull_request.number }}" \
            --title "Release v${NEW_VERSION}" \
            --body "$PR_BODY"
