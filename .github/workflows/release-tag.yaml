# Runs on every push to main:
# 1. Builds all container images with "latest" + SHA tags (always)
# 2. Determines version from conventional commits and creates a v* tag (conditional)
#
# The v* tag triggers release.yaml which builds versioned artifacts.
# Uses a GitHub App (Volundr Release Bot) to push tags to protected branches.
# Required secrets: APP_ID, APP_PRIVATE_KEY
name: Main

on:
  push:
    branches: [main]

permissions: read-all

env:
  REGISTRY: ghcr.io

concurrency:
  group: main-${{ github.sha }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Containers — build per platform natively, then merge manifests
  # ---------------------------------------------------------------------------
  build-container-image:
    name: "Build ${{ matrix.container }} (${{ matrix.platform }})"
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [amd64, arm64]
        container: [volundr, skuld, devrunner, volundr-web, vscode-reh, tyr, niuu, mimir, bifrost]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}:${{ github.sha }}-${{ matrix.platform }}
          labels: |
            org.opencontainers.image.title=${{ matrix.container }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=Niuu Labs
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.container }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.container }}-${{ matrix.platform }}
          platforms: linux/${{ matrix.platform }}
          provenance: false

  merge-container-manifests:
    name: "Manifest ${{ matrix.container }}"
    needs: build-container-image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        container: [volundr, skuld, devrunner, volundr-web, vscode-reh, tyr, niuu, mimir, bifrost]
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          # latest
          docker manifest create "${IMAGE}:latest" \
            "${IMAGE}:${SHA}-amd64" \
            "${IMAGE}:${SHA}-arm64"
          docker manifest push "${IMAGE}:latest"

          # short sha
          docker manifest create "${IMAGE}:${SHORT_SHA}" \
            "${IMAGE}:${SHA}-amd64" \
            "${IMAGE}:${SHA}-arm64"
          docker manifest push "${IMAGE}:${SHORT_SHA}"

  # ---------------------------------------------------------------------------
  # Version tagging
  # ---------------------------------------------------------------------------
  tag:
    name: Determine Version & Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Determine version bump
        id: version
        run: |
          # Get the last release tag or use 0.0.0 if none exists
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LAST_VERSION=${LAST_TAG#v}

          # Collect commit subjects since last tag, skipping merge commits.
          # This ensures version detection works regardless of merge strategy
          # (merge commit, squash, rebase) by looking at the actual feature
          # commits rather than the merge commit message.
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMIT_SUBJECTS=$(git log --no-merges --pretty=format:"%s" HEAD)
          else
            COMMIT_SUBJECTS=$(git log --no-merges --pretty=format:"%s" ${LAST_TAG}..HEAD)
          fi

          echo "Last version: $LAST_VERSION"
          echo "Commit subjects since last release:"
          echo "$COMMIT_SUBJECTS"
          echo "---"

          # Determine version bump type from conventional commit subjects
          VERSION_TYPE="none"
          if echo "$COMMIT_SUBJECTS" | grep -qiE "^feat(\(.+\))?!:|^BREAKING CHANGE:"; then
            VERSION_TYPE="major"
          elif echo "$COMMIT_SUBJECTS" | grep -qiE "^(feat|refactor)(\(.+\))?:"; then
            VERSION_TYPE="minor"
          elif echo "$COMMIT_SUBJECTS" | grep -qiE "^(fix|style)(\(.+\))?:"; then
            VERSION_TYPE="patch"
          fi

          echo "Version bump type: $VERSION_TYPE"

          if [ "$VERSION_TYPE" = "none" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
          case $VERSION_TYPE in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          echo "New version: $NEW_VERSION"
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.version.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"
