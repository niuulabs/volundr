# Runs on every push to dev:
# 1. Full test suite (lint, unit tests, integration tests, e2e, web tests, helm lint)
# 2. Builds all container images with "dev" + "dev-<sha>" tags
# 3. Determines next version from conventional commits and creates a v*-dev.N prerelease tag
# 4. Packages Helm charts with the dev version
# 5. Builds CLI binaries (uploaded as artifacts, no GitHub Release)
#
# The dev prerelease tags (v*-dev.N) are skipped by release.yaml so they
# never create a production GitHub Release.
name: Dev

on:
  push:
    branches: [dev]

permissions: read-all

env:
  REGISTRY: ghcr.io
  CHART_REPO: oci://ghcr.io/${{ github.repository_owner }}/charts

concurrency:
  group: dev-${{ github.sha }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Python — lint + unit tests
  # ---------------------------------------------------------------------------
  python-lint:
    name: "Python: Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff linting
        run: uv run ruff check src/ tests/

      - name: Check ruff formatting
        run: uv run ruff format --check src/ tests/ || echo "::warning::Formatting issues found - consider running 'ruff format src/ tests/'"
        continue-on-error: true

  python-test-volundr:
    name: "Python: Test Volundr"
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ --ignore=tests/test_tyr --ignore=tests/integration -v --tb=short \
            --override-ini="addopts=" \
            --cov=src/volundr --cov=src/cli --cov=src/niuu --cov=src/skuld \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85

      - name: Upload coverage to Codecov
        if: always() && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: coverage.xml
          flags: backend-volundr
          token: ${{ secrets.CODECOV_TOKEN }}

  python-test-tyr:
    name: "Python: Test Tyr"
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/test_tyr -v --tb=short \
            --override-ini="addopts=" \
            --cov=src/tyr \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85

      - name: Upload coverage to Codecov
        if: always() && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: coverage.xml
          flags: backend-tyr
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Python integration tests (real PostgreSQL)
  # ---------------------------------------------------------------------------
  python-integration-test-volundr:
    name: "Python: Integration Test Volundr"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: volundr_test
          POSTGRES_PASSWORD: volundr_test
          POSTGRES_DB: volundr_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run integration tests
        env:
          TEST_DATABASE_HOST: localhost
          TEST_DATABASE_PORT: "5432"
          TEST_DATABASE_USER: volundr_test
          TEST_DATABASE_PASSWORD: volundr_test
          TEST_DATABASE_NAME: volundr_test
        run: |
          uv run pytest tests/integration/volundr/ -v --tb=short -m integration \
            --override-ini="addopts="

  python-integration-test-tyr:
    name: "Python: Integration Test Tyr"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: volundr_test
          POSTGRES_PASSWORD: volundr_test
          POSTGRES_DB: volundr_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run integration tests
        env:
          TEST_DATABASE_HOST: localhost
          TEST_DATABASE_PORT: "5432"
          TEST_DATABASE_USER: volundr_test
          TEST_DATABASE_PASSWORD: volundr_test
          TEST_DATABASE_NAME: volundr_test
        run: |
          uv run pytest tests/integration/tyr/ -v --tb=short -m integration \
            --override-ini="addopts="

  # ---------------------------------------------------------------------------
  # End-to-end tests (Playwright against real backend + frontend)
  # ---------------------------------------------------------------------------
  e2e-test:
    name: "E2E: Playwright"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: volundr_test
          POSTGRES_PASSWORD: volundr_test
          POSTGRES_DB: volundr_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-extras --dev

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Start backend
        env:
          DATABASE__HOST: localhost
          DATABASE__PORT: "5432"
          DATABASE__USER: volundr_test
          DATABASE__PASSWORD: volundr_test
          DATABASE__NAME: volundr_test
        run: |
          uv run uvicorn volundr.main:app --port 8080 &

      - name: Start frontend
        run: |
          npm run dev -- --port 5174 &
        working-directory: web

      - name: Wait for servers
        run: |
          timeout 30 bash -c '
            until curl -sf http://localhost:8080/health > /dev/null 2>&1; do
              sleep 1
            done
          '
          timeout 30 bash -c '
            until curl -sf http://localhost:5174 > /dev/null 2>&1; do
              sleep 1
            done
          '
          echo "Both servers are ready"

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: web

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Web — lint + unit tests
  # ---------------------------------------------------------------------------
  web-lint:
    name: "Web: Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: TypeScript check
        run: npm run typecheck

  web-test:
    name: "Web: Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: always() && hashFiles('web/coverage/lcov.info') != ''
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: web/coverage/lcov.info
          flags: web
          token: ${{ secrets.CODECOV_TOKEN }}
          working-directory: web

  # ---------------------------------------------------------------------------
  # Helm — lint
  # ---------------------------------------------------------------------------
  helm-lint:
    name: "Helm: Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        run: |
          HELM_VERSION="3.14.0"
          curl -sSfL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          echo "f43e1c3387de24547506ab05d24e5309c0ce0b228c23bd8aa64e9ec4b8206651  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp
          mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Lint skuld chart
        run: helm lint charts/skuld/

      - name: Lint volundr chart
        run: helm lint charts/volundr/

      - name: Lint tyr chart
        run: helm lint charts/tyr/

      - name: Lint skuld-planner chart
        run: helm lint charts/skuld-planner/

      - name: Lint niuu-shared chart
        run: helm lint charts/niuu-shared/

      - name: Lint niuu umbrella chart
        run: |
          helm dependency build charts/niuu
          helm lint charts/niuu/

  # ---------------------------------------------------------------------------
  # Containers — build per platform natively, then merge manifests
  # ---------------------------------------------------------------------------
  build-container-image:
    name: "Build ${{ matrix.container }} (${{ matrix.platform }})"
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [amd64, arm64]
        container: [volundr, skuld, devrunner, volundr-web, vscode-reh, tyr, niuu, mimir, bifrost]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}:${{ github.sha }}-${{ matrix.platform }}
          build-args: |
            APP_VERSION=dev-${{ github.sha }}
          labels: |
            org.opencontainers.image.title=${{ matrix.container }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=Niuu Labs
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.container }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.container }}-${{ matrix.platform }}
          platforms: linux/${{ matrix.platform }}
          provenance: false

  merge-container-manifests:
    name: "Manifest ${{ matrix.container }}"
    needs: build-container-image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        container: [volundr, skuld, devrunner, volundr-web, vscode-reh, tyr, niuu, mimir, bifrost]
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.container }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          # dev tag (mutable, always points to latest dev build)
          docker manifest create "${IMAGE}:dev" \
            "${IMAGE}:${SHA}-amd64" \
            "${IMAGE}:${SHA}-arm64"
          docker manifest push "${IMAGE}:dev"

          # dev + short sha (immutable, for pinning)
          docker manifest create "${IMAGE}:dev-${SHORT_SHA}" \
            "${IMAGE}:${SHA}-amd64" \
            "${IMAGE}:${SHA}-arm64"
          docker manifest push "${IMAGE}:dev-${SHORT_SHA}"

  # ---------------------------------------------------------------------------
  # Version tagging — prerelease dev tags
  # ---------------------------------------------------------------------------
  tag:
    name: Determine Version & Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.new_version }}
      should_release: ${{ steps.version.outputs.should_release }}
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Determine version bump
        id: version
        run: |
          # Get the last production (non-prerelease) tag
          LAST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
            | grep -v '-' | head -1 || echo "v0.0.0")
          LAST_VERSION=${LAST_TAG#v}

          # Get all commit messages since last production tag
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMIT_MSGS=$(git log --pretty=%B HEAD)
          else
            COMMIT_MSGS=$(git log --pretty=%B ${LAST_TAG}..HEAD)
          fi

          echo "Last production version: $LAST_VERSION"

          # Determine version bump type from conventional commits
          VERSION_TYPE="none"
          if echo "$COMMIT_MSGS" | grep -qiE "^feat(\(.+\))?!:|^BREAKING CHANGE:"; then
            VERSION_TYPE="major"
          elif echo "$COMMIT_MSGS" | grep -qiE "^(feat|refactor)(\(.+\))?:"; then
            VERSION_TYPE="minor"
          elif echo "$COMMIT_MSGS" | grep -qiE "^(fix|style)(\(.+\))?:"; then
            VERSION_TYPE="patch"
          fi

          echo "Version bump type: $VERSION_TYPE"

          if [ "$VERSION_TYPE" = "none" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Calculate next version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
          case $VERSION_TYPE in
            major) NEW_BASE="$((MAJOR + 1)).0.0" ;;
            minor) NEW_BASE="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_BASE="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          # Count existing dev tags for this base version to determine N
          DEV_COUNT=$(git tag -l "v${NEW_BASE}-dev.*" | wc -l | tr -d ' ')
          DEV_N=$((DEV_COUNT + 1))
          NEW_VERSION="${NEW_BASE}-dev.${DEV_N}"

          echo "New dev version: $NEW_VERSION"
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.version.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Dev release v${VERSION}"
          git push origin "v${VERSION}"

  # ---------------------------------------------------------------------------
  # Helm charts — dev versions
  # ---------------------------------------------------------------------------
  build-charts:
    name: Build Helm Charts
    needs: [tag]
    if: needs.tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.14.0

      - name: Update chart versions
        run: |
          VERSION="${{ needs.tag.outputs.version }}"

          sed -i "s/^version:.*/version: $VERSION/" charts/skuld/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/skuld/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/volundr/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/volundr/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/tyr/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/tyr/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/niuu-shared/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/niuu-shared/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/niuu/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/niuu/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/skuld-planner/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/skuld-planner/Chart.yaml

      - name: Package Helm charts
        run: |
          helm package charts/skuld -d .helm-packages/
          helm package charts/skuld-planner -d .helm-packages/
          helm package charts/volundr -d .helm-packages/
          helm package charts/tyr -d .helm-packages/
          helm package charts/niuu-shared -d .helm-packages/
          helm dependency build charts/niuu
          helm package charts/niuu -d .helm-packages/

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm charts to OCI registry
        run: |
          helm push .helm-packages/skuld-0*.tgz ${{ env.CHART_REPO }}
          helm push .helm-packages/skuld-planner-*.tgz ${{ env.CHART_REPO }}
          helm push .helm-packages/volundr-*.tgz ${{ env.CHART_REPO }}
          helm push .helm-packages/tyr-*.tgz ${{ env.CHART_REPO }}
          helm push .helm-packages/niuu-shared-*.tgz ${{ env.CHART_REPO }}
          helm push .helm-packages/niuu-0*.tgz ${{ env.CHART_REPO }}

  # ---------------------------------------------------------------------------
  # CLI binaries (Python/Nuitka) — build only, no GitHub Release
  # ---------------------------------------------------------------------------
  build-cli:
    name: "Build CLI (${{ matrix.os }}/${{ matrix.arch }})"
    needs: [tag]
    if: needs.tag.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-15
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache PostgreSQL build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v4
        with:
          path: build/pginstall
          key: pginstall-${{ runner.os }}-${{ runner.arch }}-pg17.9-vec0.8.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v6
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: uv sync --python 3.12 --extra cli --extra dev

      - name: Build
        run: make build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: niuu-dev-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/niuu-${{ matrix.os }}-${{ matrix.arch }}
          retention-days: 14
