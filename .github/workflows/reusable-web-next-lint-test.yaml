# Reusable: web-next/ lint, vitest, and Playwright E2E.
# Called by ci.yaml when web-next/ changed.
name: Reusable — web-next Lint + Test

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

permissions: read-all

jobs:
  lint:
    name: "web-next: Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-next
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-next/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter='./packages/*' build

      - name: Typecheck
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check

  test:
    name: "web-next: Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-next
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-next/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter='./packages/*' build

      - name: Run tests with coverage (fail under 85%)
        run: pnpm test

      - name: Upload coverage to Codecov
        if: always() && hashFiles('web-next/coverage/lcov.info') != ''
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: web-next/coverage/lcov.info
          flags: web-next
          token: ${{ secrets.CODECOV_TOKEN }}
          working-directory: web-next

  e2e:
    name: "web-next: E2E"
    if: false # temporarily disabled — visual regression baselines being updated
    runs-on: ubuntu-latest
    # Increased from 15m to 20m — visual regression screenshots add ~5m on CI.
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web-next
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-next/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter='./packages/*' build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests (including visual regression)
        run: pnpm test:e2e

      - name: Upload Playwright report (with visual diffs on failure)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: web-next-playwright-report
          path: web-next/playwright-report/
          retention-days: 7
