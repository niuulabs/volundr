name: "CLI: Release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: cli-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: "Build ${{ matrix.os }}-${{ matrix.arch }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: arm64
            runner: macos-14
          - os: darwin
            arch: amd64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (with cli extras)
        run: uv sync --extra cli --dev

      - name: Install patchelf (Linux only)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web UI
        run: make build-web

      - name: Copy migrations
        run: make copy-migrations

      - name: Build binary
        run: make build-cli

      - name: Rename binary
        run: |
          SUFFIX="${{ matrix.os }}-${{ matrix.arch }}"
          # Nuitka names it niuu-{os}-{arch}, just verify
          ls -lh dist/

      - name: Smoke test
        run: |
          BINARY=$(find dist/ -name "niuu-*" -type f | head -1)
          chmod +x "${BINARY}"
          bash scripts/smoke-test.sh "${BINARY}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: niuu-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/niuu-*
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum niuu-* > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "${TAG}" \
            --title "Niuu CLI ${TAG}" \
            --generate-notes \
            release-artifacts/niuu-* \
            release-artifacts/checksums.sha256
