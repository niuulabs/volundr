name: CI

on:
  pull_request:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Change detection + pipeline tier
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      python: ${{ steps.override.outputs.python }}
      web: ${{ steps.override.outputs.web }}
      helm: ${{ steps.override.outputs.helm }}
      container-names: ${{ steps.override.outputs.names }}
      has_containers: ${{ steps.override.outputs.any }}
      tier: ${{ steps.tier.outputs.level }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # TODO: restore path-based filtering after pipelines are validated
      # - name: Detect path changes
      #   uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
      #   id: filter
      #   with:
      #     filters: |
      #       python:
      #         - 'src/**'
      #         - 'tests/**'
      #         - 'pyproject.toml'
      #         - 'uv.lock'
      #       web:
      #         - 'web/**'
      #       helm:
      #         - 'charts/**'
      #       container-python:
      #         - 'src/**'
      #         - 'pyproject.toml'
      #         - 'containers/volundr/**'
      #         - 'containers/skuld/**'
      #       container-web:
      #         - 'web/**'
      #         - 'containers/volundr-web/**'
      #       container-devrunner:
      #         - 'containers/devrunner/**'

      # TODO: restore dynamic container list after pipelines are validated
      # - name: Build container list
      #   id: containers
      #   run: |
      #     NAMES="[]"
      #     if [ "${{ steps.filter.outputs.container-python }}" = "true" ]; then
      #       NAMES=$(echo "$NAMES" | jq -c '. + ["volundr","skuld"]')
      #     fi
      #     if [ "${{ steps.filter.outputs.container-web }}" = "true" ]; then
      #       NAMES=$(echo "$NAMES" | jq -c '. + ["volundr-web"]')
      #     fi
      #     if [ "${{ steps.filter.outputs.container-devrunner }}" = "true" ]; then
      #       NAMES=$(echo "$NAMES" | jq -c '. + ["devrunner"]')
      #     fi
      #     echo "names=$NAMES" >> $GITHUB_OUTPUT
      #     if [ "$NAMES" = "[]" ]; then
      #       echo "any=false" >> $GITHUB_OUTPUT
      #     else
      #       echo "any=true" >> $GITHUB_OUTPUT
      #     fi

      - name: Hardcode all changes to true for testing
        id: override
        run: |
          echo "python=true" >> $GITHUB_OUTPUT
          echo "web=true" >> $GITHUB_OUTPUT
          echo "helm=true" >> $GITHUB_OUTPUT
          echo 'names=["volundr","skuld","devrunner","volundr-web","vscode-reh","tyr","niuu"]' >> $GITHUB_OUTPUT
          echo "any=true" >> $GITHUB_OUTPUT

      - name: Determine pipeline tier
        id: tier
        run: |
          # PRs targeting feat/* branches run a light pipeline (lint + unit tests).
          # PRs targeting dev or main run the full pipeline.
          BASE="${{ github.base_ref }}"
          if [[ "$BASE" == feat/* ]]; then
            echo "level=light" >> $GITHUB_OUTPUT
            echo "Pipeline tier: light (PR targets ${BASE})"
          else
            echo "level=full" >> $GITHUB_OUTPUT
            echo "Pipeline tier: full (PR targets ${BASE})"
          fi

  # ---------------------------------------------------------------------------
  # Python — lint + unit tests (all tiers)
  # ---------------------------------------------------------------------------
  python-lint:
    name: "Python: Lint"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff linting
        run: uv run ruff check src/ tests/

      - name: Check ruff formatting
        run: uv run ruff format --check src/ tests/ || echo "::warning::Formatting issues found - consider running 'ruff format src/ tests/'"
        continue-on-error: true

  python-test-volundr:
    name: "Python: Test Volundr"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ --ignore=tests/test_tyr --ignore=tests/integration -v --tb=short \
            --override-ini="addopts=" \
            --cov=src/volundr --cov=src/cli --cov=src/niuu --cov=src/skuld \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85

      - name: Upload coverage to Codecov
        if: always() && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: coverage.xml
          flags: backend-volundr
          token: ${{ secrets.CODECOV_TOKEN }}

  python-test-tyr:
    name: "Python: Test Tyr"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/test_tyr -v --tb=short \
            --override-ini="addopts=" \
            --cov=src/tyr \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85

      - name: Upload coverage to Codecov
        if: always() && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: coverage.xml
          flags: backend-tyr
          token: ${{ secrets.CODECOV_TOKEN }}

  # Rollup gate — branch ruleset requires "Python: Test"
  python-test:
    name: "Python: Test"
    needs: [python-test-volundr, python-test-tyr]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.python-test-volundr.result }}" == "failure" ]] || \
             [[ "${{ needs.python-test-tyr.result }}" == "failure" ]]; then
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Python integration tests — full tier only
  # ---------------------------------------------------------------------------
  python-integration-test-volundr:
    name: "Python: Integration Test Volundr"
    needs: changes
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: volundr_test
          POSTGRES_PASSWORD: volundr_test
          POSTGRES_DB: volundr_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run integration tests
        env:
          TEST_DATABASE_HOST: localhost
          TEST_DATABASE_PORT: "5432"
          TEST_DATABASE_USER: volundr_test
          TEST_DATABASE_PASSWORD: volundr_test
          TEST_DATABASE_NAME: volundr_test
        run: |
          uv run pytest tests/integration/volundr/ -v --tb=short -m integration \
            --override-ini="addopts="

  python-integration-test-tyr:
    name: "Python: Integration Test Tyr"
    needs: changes
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: volundr_test
          POSTGRES_PASSWORD: volundr_test
          POSTGRES_DB: volundr_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run integration tests
        env:
          TEST_DATABASE_HOST: localhost
          TEST_DATABASE_PORT: "5432"
          TEST_DATABASE_USER: volundr_test
          TEST_DATABASE_PASSWORD: volundr_test
          TEST_DATABASE_NAME: volundr_test
        run: |
          uv run pytest tests/integration/tyr/ -v --tb=short -m integration \
            --override-ini="addopts="

  # Rollup gate — branch ruleset requires "Python: Integration Test"
  python-integration-test:
    name: "Python: Integration Test"
    needs: [changes, python-integration-test-volundr, python-integration-test-tyr]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          # Skip check if tier is light (integration tests were not required)
          if [[ "${{ needs.changes.outputs.tier }}" == "light" ]]; then
            echo "Skipped — light tier pipeline"
            exit 0
          fi
          if [[ "${{ needs.python-integration-test-volundr.result }}" == "failure" ]] || \
             [[ "${{ needs.python-integration-test-tyr.result }}" == "failure" ]]; then
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # End-to-end tests — full tier only
  # ---------------------------------------------------------------------------
  e2e-test:
    name: "E2E: Playwright"
    needs: changes
    if: needs.changes.outputs.tier == 'full' && (needs.changes.outputs.python == 'true' || needs.changes.outputs.web == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: volundr_test
          POSTGRES_PASSWORD: volundr_test
          POSTGRES_DB: volundr_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-extras --dev

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Start backend
        env:
          DATABASE__HOST: localhost
          DATABASE__PORT: "5432"
          DATABASE__USER: volundr_test
          DATABASE__PASSWORD: volundr_test
          DATABASE__NAME: volundr_test
        run: |
          uv run uvicorn volundr.main:app --port 8080 &

      - name: Start frontend
        run: |
          npm run dev -- --port 5174 &
        working-directory: web

      - name: Wait for servers
        run: |
          timeout 30 bash -c '
            until curl -sf http://localhost:8080/health > /dev/null 2>&1; do
              sleep 1
            done
          '
          timeout 30 bash -c '
            until curl -sf http://localhost:5174 > /dev/null 2>&1; do
              sleep 1
            done
          '
          echo "Both servers are ready"

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: web

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Web — lint + unit tests (all tiers)
  # ---------------------------------------------------------------------------
  web-lint:
    name: "Web: Lint"
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: TypeScript check
        run: npm run typecheck

  web-test:
    name: "Web: Test"
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: always() && hashFiles('web/coverage/lcov.info') != ''
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: web/coverage/lcov.info
          flags: web
          token: ${{ secrets.CODECOV_TOKEN }}
          working-directory: web

  # ---------------------------------------------------------------------------
  # Helm — full tier only
  # ---------------------------------------------------------------------------
  helm-lint:
    name: "Helm: Lint"
    needs: changes
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        run: |
          HELM_VERSION="3.14.0"
          curl -sSfL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          echo "f43e1c3387de24547506ab05d24e5309c0ce0b228c23bd8aa64e9ec4b8206651  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp
          mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Lint skuld chart
        run: helm lint charts/skuld/

      - name: Lint volundr chart
        run: helm lint charts/volundr/

      - name: Lint tyr chart
        run: helm lint charts/tyr/

      - name: Lint skuld-planner chart
        run: helm lint charts/skuld-planner/

      - name: Lint niuu-shared chart
        run: helm lint charts/niuu-shared/

      - name: Lint niuu umbrella chart
        run: |
          helm dependency build charts/niuu
          helm lint charts/niuu/

  # ---------------------------------------------------------------------------
  # Helm — smoke test (kind cluster) — full tier only
  # ---------------------------------------------------------------------------
  helm-smoke-test:
    name: "Helm: Smoke Test"
    needs: [changes, merge-container-manifests]
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        run: |
          HELM_VERSION="3.14.0"
          curl -sSfL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          echo "f43e1c3387de24547506ab05d24e5309c0ce0b228c23bd8aa64e9ec4b8206651  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp
          mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: ci-test

      - name: Install Postgres in cluster
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm install pg bitnami/postgresql \
            --set auth.postgresPassword=test \
            --set auth.database=volundr \
            --set primary.persistence.enabled=false \
            --set primary.initdb.scripts."init\.sql"="CREATE DATABASE tyr;" \
            --wait --timeout 120s

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load PR container images into kind
        run: |
          PR_TAG="pr-${{ github.event.number }}"
          for CONTAINER in volundr tyr skuld; do
            IMAGE="ghcr.io/${{ github.repository_owner }}/${CONTAINER}:${PR_TAG}"
            if docker pull "${IMAGE}"; then
              kind load docker-image "${IMAGE}" --name ci-test
            else
              echo "::warning::Could not pull ${IMAGE} — chart will use image pull from registry"
            fi
          done

      - name: Install Volundr chart
        run: |
          helm install volundr charts/volundr/ \
            -f charts/volundr/ci-values.yaml \
            --set image.tag="pr-${{ github.event.number }}" \
            --wait --timeout 120s

      - name: Install Tyr chart
        run: |
          helm install tyr charts/tyr/ \
            -f charts/tyr/ci-values.yaml \
            --set image.tag="pr-${{ github.event.number }}" \
            --wait --timeout 120s

      - name: Install Skuld chart
        run: |
          helm install skuld charts/skuld/ \
            -f charts/skuld/ci-values.yaml \
            --set image.tag="pr-${{ github.event.number }}" \
            --wait --timeout 120s

      - name: Verify Volundr pods are ready
        run: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=volundr --timeout=60s

      - name: Verify Tyr pods are ready
        run: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=tyr --timeout=60s

      - name: Verify Skuld pods are ready
        run: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=skuld --timeout=60s

      - name: Health check Volundr
        run: |
          kubectl port-forward svc/volundr 8080:80 &
          PF_PID=$!
          sleep 3
          curl -sf http://localhost:8080/health
          kill $PF_PID || true

      - name: Health check Tyr
        run: |
          kubectl port-forward svc/tyr 8081:80 &
          PF_PID=$!
          sleep 3
          curl -sf http://localhost:8081/health
          kill $PF_PID || true

      - name: Verify Kubernetes resources
        run: |
          echo "--- ConfigMaps ---"
          kubectl get configmaps -l app.kubernetes.io/managed-by=Helm
          echo "--- Secrets ---"
          kubectl get secrets -l app.kubernetes.io/managed-by=Helm
          echo "--- ServiceAccounts ---"
          kubectl get serviceaccounts -l app.kubernetes.io/managed-by=Helm
          echo "--- Services ---"
          kubectl get services
          echo "--- Pods ---"
          kubectl get pods -o wide

      - name: Dump pod logs on failure
        if: failure()
        run: |
          echo "=== Volundr logs ==="
          kubectl logs -l app.kubernetes.io/name=volundr --tail=50 || true
          echo "=== Tyr logs ==="
          kubectl logs -l app.kubernetes.io/name=tyr --tail=50 || true
          echo "=== Skuld logs ==="
          kubectl logs -l app.kubernetes.io/name=skuld --all-containers --tail=50 || true
          echo "=== Events ==="
          kubectl get events --sort-by=.lastTimestamp | tail -30 || true

  # ---------------------------------------------------------------------------
  # Containers — full tier only
  # ---------------------------------------------------------------------------
  build-container-image:
    name: "Container: ${{ matrix.container }} (${{ matrix.platform }})"
    needs: changes
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.has_containers == 'true'
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [amd64, arm64]
        container: ${{ fromJson(needs.changes.outputs.container-names) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:pr-${{ github.event.number }}-${{ matrix.platform }}
          labels: |
            dev.volundr.pr=${{ github.event.number }}
            dev.volundr.ephemeral=true
          cache-from: type=gha,scope=${{ matrix.container }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.container }}-${{ matrix.platform }}
          platforms: linux/${{ matrix.platform }}
          provenance: false

  merge-container-manifests:
    name: "Container: ${{ matrix.container }} (manifest)"
    needs: [changes, build-container-image]
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.has_containers == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        container: ${{ fromJson(needs.changes.outputs.container-names) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}"
          SHA_TAG="pr-${{ github.event.number }}-${{ github.sha }}"
          PR_TAG="pr-${{ github.event.number }}"

          docker manifest create "${IMAGE}:${SHA_TAG}" \
            "${IMAGE}:pr-${{ github.event.number }}-amd64" \
            "${IMAGE}:pr-${{ github.event.number }}-arm64"
          docker manifest push "${IMAGE}:${SHA_TAG}"

          docker manifest create "${IMAGE}:${PR_TAG}" \
            "${IMAGE}:pr-${{ github.event.number }}-amd64" \
            "${IMAGE}:pr-${{ github.event.number }}-arm64"
          docker manifest push "${IMAGE}:${PR_TAG}"

  # ---------------------------------------------------------------------------
  # Helm charts — PR versions — full tier only
  # ---------------------------------------------------------------------------
  build-charts:
    name: Build Helm Charts
    needs: changes
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        run: |
          HELM_VERSION="3.14.0"
          curl -sSfL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          echo "f43e1c3387de24547506ab05d24e5309c0ce0b228c23bd8aa64e9ec4b8206651  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp
          mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Update chart versions
        run: |
          VERSION="0.0.0-pr.${{ github.event.number }}"

          sed -i "s/^version:.*/version: $VERSION/" charts/skuld/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/skuld/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/volundr/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/volundr/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/tyr/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/tyr/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/niuu-shared/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/niuu-shared/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/niuu/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/niuu/Chart.yaml

      - name: Package Helm charts
        run: |
          helm package charts/skuld -d .helm-packages/
          helm package charts/volundr -d .helm-packages/
          helm package charts/tyr -d .helm-packages/
          helm package charts/niuu-shared -d .helm-packages/
          helm dependency build charts/niuu
          helm package charts/niuu -d .helm-packages/

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm charts to OCI registry
        run: |
          helm push .helm-packages/skuld-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push .helm-packages/volundr-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push .helm-packages/tyr-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push .helm-packages/niuu-shared-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push .helm-packages/niuu-0*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  # ---------------------------------------------------------------------------
  # Security — container vulnerability scanning — full tier only
  # ---------------------------------------------------------------------------
  scan-containers:
    name: "Scan: ${{ matrix.container }}"
    needs: [changes, merge-container-manifests]
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.has_containers == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    strategy:
      matrix:
        container: ${{ fromJson(needs.changes.outputs.container-names) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Grype
        run: |
          GRYPE_VERSION="0.87.0"
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/247f5d72abf2131aa37f3164a98495c121b29029/install.sh | sh -s -- -b /usr/local/bin "v${GRYPE_VERSION}"
          grype version

      - name: Scan container with Grype
        run: |
          grype "ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:pr-${{ github.event.number }}" \
            --only-fixed \
            --fail-on critical \
            -o sarif > "grype-${{ matrix.container }}.sarif"

      - name: Upload Grype results
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: always()
        with:
          sarif_file: grype-${{ matrix.container }}.sarif
          category: grype-${{ matrix.container }}

  # ---------------------------------------------------------------------------
  # Security (always runs)
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
