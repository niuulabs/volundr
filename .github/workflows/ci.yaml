name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Change detection — only run what's affected
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      python: ${{ steps.override.outputs.python }}
      web: ${{ steps.override.outputs.web }}
      go: ${{ steps.override.outputs.go }}
      helm: ${{ steps.override.outputs.helm }}
      container-names: ${{ steps.override.outputs.names }}
      has_containers: ${{ steps.override.outputs.any }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # TODO: restore path-based filtering after pipelines are validated
      # - name: Detect path changes
      #   uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
      #   id: filter
      #   with:
      #     filters: |
      #       python:
      #         - 'src/**'
      #         - 'tests/**'
      #         - 'pyproject.toml'
      #         - 'uv.lock'
      #       web:
      #         - 'web/**'
      #       go:
      #         - 'cli/**'
      #       helm:
      #         - 'charts/**'
      #       container-python:
      #         - 'src/**'
      #         - 'pyproject.toml'
      #         - 'containers/volundr/**'
      #         - 'containers/skuld/**'
      #         - 'containers/skuld-codex/**'
      #       container-web:
      #         - 'web/**'
      #         - 'containers/volundr-web/**'
      #       container-devrunner:
      #         - 'containers/devrunner/**'

      # TODO: restore dynamic container list after pipelines are validated
      # - name: Build container list
      #   id: containers
      #   run: |
      #     NAMES="[]"
      #     if [ "${{ steps.filter.outputs.container-python }}" = "true" ]; then
      #       NAMES=$(echo "$NAMES" | jq -c '. + ["volundr","skuld","skuld-codex"]')
      #     fi
      #     if [ "${{ steps.filter.outputs.container-web }}" = "true" ]; then
      #       NAMES=$(echo "$NAMES" | jq -c '. + ["volundr-web"]')
      #     fi
      #     if [ "${{ steps.filter.outputs.container-devrunner }}" = "true" ]; then
      #       NAMES=$(echo "$NAMES" | jq -c '. + ["devrunner"]')
      #     fi
      #     echo "names=$NAMES" >> $GITHUB_OUTPUT
      #     if [ "$NAMES" = "[]" ]; then
      #       echo "any=false" >> $GITHUB_OUTPUT
      #     else
      #       echo "any=true" >> $GITHUB_OUTPUT
      #     fi

      - name: Hardcode all changes to true for testing
        id: override
        run: |
          echo "python=true" >> $GITHUB_OUTPUT
          echo "web=true" >> $GITHUB_OUTPUT
          echo "go=true" >> $GITHUB_OUTPUT
          echo "helm=true" >> $GITHUB_OUTPUT
          echo 'names=["volundr","skuld","skuld-codex","devrunner","volundr-web","vscode-reh","tyr"]' >> $GITHUB_OUTPUT
          echo "any=true" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Python
  # ---------------------------------------------------------------------------
  python-lint:
    name: "Python: Lint"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff linting
        run: uv run ruff check src/ tests/

      - name: Check ruff formatting
        run: uv run ruff format --check src/ tests/ || echo "::warning::Formatting issues found - consider running 'ruff format src/ tests/'"
        continue-on-error: true

  python-test-volundr:
    name: "Python: Test Volundr"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ --ignore=tests/test_tyr -v --tb=short \
            --cov=src/volundr \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          CODECOV_VERSION="v0.8.0"
          curl -sSfL "https://uploader.codecov.io/${CODECOV_VERSION}/linux/codecov" -o /tmp/codecov
          curl -sSfL "https://uploader.codecov.io/${CODECOV_VERSION}/linux/codecov.SHA256SUM" -o /tmp/codecov.SHA256SUM
          cd /tmp && sha256sum -c codecov.SHA256SUM
          chmod +x /tmp/codecov
          /tmp/codecov -f coverage.xml -F backend-volundr -t "${CODECOV_TOKEN}"

  python-test-tyr:
    name: "Python: Test Tyr"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.2"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/test_tyr -v --tb=short \
            --override-ini="addopts=" \
            --cov=src/tyr \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=85

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          CODECOV_VERSION="v0.8.0"
          curl -sSfL "https://uploader.codecov.io/${CODECOV_VERSION}/linux/codecov" -o /tmp/codecov
          curl -sSfL "https://uploader.codecov.io/${CODECOV_VERSION}/linux/codecov.SHA256SUM" -o /tmp/codecov.SHA256SUM
          cd /tmp && sha256sum -c codecov.SHA256SUM
          chmod +x /tmp/codecov
          /tmp/codecov -f coverage.xml -F backend-tyr -t "${CODECOV_TOKEN}"

  # ---------------------------------------------------------------------------
  # Web
  # ---------------------------------------------------------------------------
  web-lint:
    name: "Web: Lint"
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: TypeScript check
        run: npm run typecheck

  web-test:
    name: "Web: Test"
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          CODECOV_VERSION="v0.8.0"
          curl -sSfL "https://uploader.codecov.io/${CODECOV_VERSION}/linux/codecov" -o /tmp/codecov
          curl -sSfL "https://uploader.codecov.io/${CODECOV_VERSION}/linux/codecov.SHA256SUM" -o /tmp/codecov.SHA256SUM
          cd /tmp && sha256sum -c codecov.SHA256SUM
          chmod +x /tmp/codecov
          /tmp/codecov -f web/coverage/lcov.info -F web -t "${CODECOV_TOKEN}"

  # ---------------------------------------------------------------------------
  # Go CLI
  # ---------------------------------------------------------------------------
  go-lint:
    name: "Go: Lint"
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Install golangci-lint
        run: |
          GOLANGCI_VERSION="2.1.6"
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/2691aacde61559ce53cfda05513ee7c70677ea31/install.sh | sh -s -- -b /usr/local/bin "v${GOLANGCI_VERSION}"
          golangci-lint version

      - name: Run golangci-lint
        working-directory: cli
        run: golangci-lint run

  go-test:
    name: "Go: Test"
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Run tests with coverage
        run: go test ./... -v -count=1 -coverprofile=coverage.out

      - name: Enforce minimum coverage (85%)
        run: |
          total=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          threshold=85.0
          if awk "BEGIN {exit !($total < $threshold)}"; then
            echo "::error::Coverage ${total}% is below minimum threshold of ${threshold}%"
            exit 1
          fi

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          CODECOV_VERSION="v0.8.0"
          curl -sSfL "https://uploader.codecov.io/${CODECOV_VERSION}/linux/codecov" -o /tmp/codecov
          curl -sSfL "https://uploader.codecov.io/${CODECOV_VERSION}/linux/codecov.SHA256SUM" -o /tmp/codecov.SHA256SUM
          cd /tmp && sha256sum -c codecov.SHA256SUM
          chmod +x /tmp/codecov
          /tmp/codecov -f cli/coverage.out -F cli -t "${CODECOV_TOKEN}"

  go-build:
    name: "Go: Build"
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build with embedded frontend
        working-directory: cli
        run: make build

  # ---------------------------------------------------------------------------
  # Helm
  # ---------------------------------------------------------------------------
  helm-lint:
    name: "Helm: Lint"
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        run: |
          HELM_VERSION="3.14.0"
          curl -sSfL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          echo "f43e1c3387de24547506ab05d24e5309c0ce0b228c23bd8aa64e9ec4b8206651  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp
          mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Lint skuld chart
        run: helm lint charts/skuld/

      - name: Lint volundr chart
        run: helm lint charts/volundr/

      - name: Lint tyr chart
        run: helm lint charts/tyr/

      - name: Lint skuld-planner chart
        run: helm lint charts/skuld-planner/

      - name: Lint niuu umbrella chart
        run: |
          helm dependency build charts/niuu
          helm lint charts/niuu/

  # ---------------------------------------------------------------------------
  # Containers — build per platform natively, then merge manifests
  # ---------------------------------------------------------------------------
  build-container-image:
    name: "Container: ${{ matrix.container }} (${{ matrix.platform }})"
    needs: changes
    if: needs.changes.outputs.has_containers == 'true'
    runs-on: ${{ matrix.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [amd64, arm64]
        container: ${{ fromJson(needs.changes.outputs.container-names) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:pr-${{ github.event.number }}-${{ matrix.platform }}
          labels: |
            dev.volundr.pr=${{ github.event.number }}
            dev.volundr.ephemeral=true
          cache-from: type=gha,scope=${{ matrix.container }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.container }}-${{ matrix.platform }}
          platforms: linux/${{ matrix.platform }}
          provenance: false

  merge-container-manifests:
    name: "Container: ${{ matrix.container }} (manifest)"
    needs: [changes, build-container-image]
    if: needs.changes.outputs.has_containers == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        container: ${{ fromJson(needs.changes.outputs.container-names) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}"
          SHA_TAG="pr-${{ github.event.number }}-${{ github.sha }}"
          PR_TAG="pr-${{ github.event.number }}"

          docker manifest create "${IMAGE}:${SHA_TAG}" \
            "${IMAGE}:pr-${{ github.event.number }}-amd64" \
            "${IMAGE}:pr-${{ github.event.number }}-arm64"
          docker manifest push "${IMAGE}:${SHA_TAG}"

          docker manifest create "${IMAGE}:${PR_TAG}" \
            "${IMAGE}:pr-${{ github.event.number }}-amd64" \
            "${IMAGE}:pr-${{ github.event.number }}-arm64"
          docker manifest push "${IMAGE}:${PR_TAG}"

  # ---------------------------------------------------------------------------
  # Helm charts — PR versions
  # ---------------------------------------------------------------------------
  build-charts:
    name: Build Helm Charts
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        run: |
          HELM_VERSION="3.14.0"
          curl -sSfL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          echo "f43e1c3387de24547506ab05d24e5309c0ce0b228c23bd8aa64e9ec4b8206651  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp
          mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Update chart versions
        run: |
          VERSION="0.0.0-pr.${{ github.event.number }}"

          sed -i "s/^version:.*/version: $VERSION/" charts/skuld/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/skuld/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/volundr/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/volundr/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/tyr/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/tyr/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/niuu/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/niuu/Chart.yaml

      - name: Package Helm charts
        run: |
          helm package charts/skuld -d .helm-packages/
          helm package charts/volundr -d .helm-packages/
          helm package charts/tyr -d .helm-packages/
          helm dependency build charts/niuu
          helm package charts/niuu -d .helm-packages/

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm charts to OCI registry
        run: |
          helm push .helm-packages/skuld-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push .helm-packages/volundr-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push .helm-packages/tyr-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push .helm-packages/niuu-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  # ---------------------------------------------------------------------------
  # Security — container vulnerability scanning (Grype)
  # ---------------------------------------------------------------------------
  scan-containers:
    name: "Scan: ${{ matrix.container }}"
    needs: [changes, merge-container-manifests]
    if: needs.changes.outputs.has_containers == 'true'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    strategy:
      matrix:
        container: ${{ fromJson(needs.changes.outputs.container-names) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Grype
        run: |
          GRYPE_VERSION="0.87.0"
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/247f5d72abf2131aa37f3164a98495c121b29029/install.sh | sh -s -- -b /usr/local/bin "v${GRYPE_VERSION}"
          grype version

      - name: Scan container with Grype
        run: |
          grype "ghcr.io/${{ github.repository_owner }}/${{ matrix.container }}:pr-${{ github.event.number }}" \
            --only-fixed \
            --fail-on critical \
            -o sarif > "grype-${{ matrix.container }}.sarif"

      - name: Upload Grype results
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        if: always()
        with:
          sarif_file: grype-${{ matrix.container }}.sarif
          category: grype-${{ matrix.container }}

