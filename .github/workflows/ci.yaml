name: CI

on:
  pull_request:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Change detection + pipeline tier
  #
  # Self-rolled path filter: we diff the PR head against its base and derive
  # per-area flags. No third-party action — we avoid the supply-chain surface
  # of marketplace filters and the logic is auditable in this file.
  #
  # Container list is derived from the same diff: a container is rebuilt only
  # when its Dockerfile or a source path it bakes in has changed.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      web: ${{ steps.filter.outputs.web }}
      web_next: ${{ steps.filter.outputs.web_next }}
      helm: ${{ steps.filter.outputs.helm }}
      container-names: ${{ steps.filter.outputs.names }}
      has_containers: ${{ steps.filter.outputs.any }}
      tier: ${{ steps.tier.outputs.level }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          CHANGED=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")
          echo "Changed files:"
          echo "${CHANGED}" | sed 's/^/  /'

          match() { echo "${CHANGED}" | grep -qE "$1"; }
          flag()  { if match "$2"; then echo "$1=true"; else echo "$1=false"; fi; }

          # Areas
          flag python   '^(src|tests)/|^pyproject\.toml$|^uv\.lock$' >> "$GITHUB_OUTPUT"
          flag web      '^web/'                                      >> "$GITHUB_OUTPUT"
          flag web_next '^web-next/'                                 >> "$GITHUB_OUTPUT"
          flag helm     '^charts/'                                   >> "$GITHUB_OUTPUT"

          # Per-container triggers: dockerfile in containers/<name>/ OR the
          # source tree the image bakes in. Python containers depend on src/
          # and the lockfiles; volundr-web depends on web/.
          PY_SRC='^(src/|pyproject\.toml$|uv\.lock$)'
          declare -A TRIGGER=(
            [volundr]="^containers/volundr/|${PY_SRC}"
            [skuld]="^containers/skuld/|${PY_SRC}"
            [tyr]="^containers/tyr/|${PY_SRC}"
            [niuu]="^containers/niuu/|${PY_SRC}"
            [bifrost]="^containers/bifrost/|${PY_SRC}"
            [mimir]="^containers/mimir/|${PY_SRC}"
            [volundr-web]='^containers/volundr-web/|^web/'
            [devrunner]='^containers/devrunner/'
            [vscode-reh]='^containers/vscode-reh/'
          )

          NAMES=()
          for NAME in volundr skuld devrunner volundr-web vscode-reh tyr niuu mimir bifrost; do
            if match "${TRIGGER[$NAME]}"; then
              NAMES+=("\"${NAME}\"")
            fi
          done

          if [ ${#NAMES[@]} -eq 0 ]; then
            echo "names=[]" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            # Join with commas
            IFS=,
            echo "names=[${NAMES[*]}]" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine pipeline tier
        id: tier
        run: |
          # PRs targeting feat/* branches run a light pipeline (lint + unit tests).
          # PRs targeting dev or main run the full pipeline.
          BASE="${{ github.base_ref }}"
          if [[ "$BASE" == feat/* ]]; then
            echo "level=light" >> $GITHUB_OUTPUT
            echo "Pipeline tier: light (PR targets ${BASE})"
          else
            echo "level=full" >> $GITHUB_OUTPUT
            echo "Pipeline tier: full (PR targets ${BASE})"
          fi

  # ---------------------------------------------------------------------------
  # Python — lint + unit tests (all tiers). Delegated to reusable workflow.
  # ---------------------------------------------------------------------------
  python:
    name: Python
    needs: changes
    if: needs.changes.outputs.python == 'true'
    uses: ./.github/workflows/reusable-python-lint-test.yaml
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Python integration tests — run at both tiers when python changed.
  # These are fast (~6 min, real services via GHA service containers) and
  # catch integration bugs before they reach dev. E2E + container-heavy jobs
  # remain full-tier only.
  # ---------------------------------------------------------------------------
  python-integration-test-volundr:
    name: "Python: Integration Test Volundr"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: volundr_test
          POSTGRES_PASSWORD: volundr_test
          POSTGRES_DB: volundr_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python + uv
        uses: ./.github/actions/setup-python-env

      - name: Run integration tests
        env:
          TEST_DATABASE_HOST: localhost
          TEST_DATABASE_PORT: "5432"
          TEST_DATABASE_USER: volundr_test
          TEST_DATABASE_PASSWORD: volundr_test
          TEST_DATABASE_NAME: volundr_test
        run: |
          uv run pytest tests/integration/volundr/ -v --tb=short -m integration \
            --override-ini="addopts="

  python-integration-test-tyr:
    name: "Python: Integration Test Tyr"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: volundr_test
          POSTGRES_PASSWORD: volundr_test
          POSTGRES_DB: volundr_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python + uv
        uses: ./.github/actions/setup-python-env

      - name: Run integration tests
        env:
          TEST_DATABASE_HOST: localhost
          TEST_DATABASE_PORT: "5432"
          TEST_DATABASE_USER: volundr_test
          TEST_DATABASE_PASSWORD: volundr_test
          TEST_DATABASE_NAME: volundr_test
        run: |
          uv run pytest tests/integration/tyr/ -v --tb=short -m integration \
            --override-ini="addopts="

  python-integration-test-sleipnir:
    name: "Python: Integration Test Sleipnir"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:4-alpine
        ports: ["5672:5672"]
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # NATS requires --jetstream flag which GHA service containers can't pass.
      # Start it manually with docker run instead.
      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats -p 4222:4222 -p 8222:8222 nats:2-alpine --jetstream --http_port 8222
          for i in $(seq 1 10); do
            curl -sf http://localhost:8222/healthz > /dev/null 2>&1 && break || sleep 1
          done

      - name: Set up Python + uv
        uses: ./.github/actions/setup-python-env
        with:
          extras: "--extra test --extra nats --extra rabbitmq --extra redis --dev"

      - name: Run Sleipnir broker integration tests
        env:
          TEST_NATS_URL: "nats://localhost:4222"
          TEST_RABBITMQ_URL: "amqp://guest:guest@localhost:5672/"
          TEST_REDIS_URL: "redis://localhost:6379"
        run: |
          uv run pytest tests/integration/sleipnir/ -v --tb=short -m broker \
            --override-ini="addopts="

  # ---------------------------------------------------------------------------
  # End-to-end tests — full tier only
  # ---------------------------------------------------------------------------
  e2e-test:
    name: "E2E: Playwright"
    needs: changes
    if: needs.changes.outputs.tier == 'full' && (needs.changes.outputs.python == 'true' || needs.changes.outputs.web == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: volundr_test
          POSTGRES_PASSWORD: volundr_test
          POSTGRES_DB: volundr_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python + uv
        uses: ./.github/actions/setup-python-env

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Start backend
        env:
          DATABASE__HOST: localhost
          DATABASE__PORT: "5432"
          DATABASE__USER: volundr_test
          DATABASE__PASSWORD: volundr_test
          DATABASE__NAME: volundr_test
        run: |
          uv run uvicorn volundr.main:app --port 8080 &

      - name: Start frontend
        run: |
          npm run dev -- --port 5174 &
        working-directory: web

      - name: Wait for servers
        run: |
          timeout 30 bash -c '
            until curl -sf http://localhost:8080/health > /dev/null 2>&1; do
              sleep 1
            done
          '
          timeout 30 bash -c '
            until curl -sf http://localhost:5174 > /dev/null 2>&1; do
              sleep 1
            done
          '
          echo "Both servers are ready"

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: web

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Web — lint + unit tests (all tiers). Delegated to reusable workflow.
  # ---------------------------------------------------------------------------
  web:
    name: Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    uses: ./.github/workflows/reusable-web-lint-test.yaml
    secrets: inherit

  # ---------------------------------------------------------------------------
  # web-next — composable plugin UI. Delegated to reusable workflow.
  # ---------------------------------------------------------------------------
  web-next:
    name: web-next
    needs: changes
    if: needs.changes.outputs.web_next == 'true'
    uses: ./.github/workflows/reusable-web-next-lint-test.yaml
    secrets: inherit

  # ---------------------------------------------------------------------------
  # web-next — publish dry-run (verifies all @niuulabs/* packages are publishable)
  # ---------------------------------------------------------------------------
  web-next-publish-dryrun:
    name: "web-next: Publish dry-run"
    needs: changes
    if: needs.changes.outputs.web_next == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-next
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-next/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter='./packages/*' build

      - name: Dry-run publish all @niuulabs/* packages
        # --no-git-checks skips the "working dir must be clean" guard.
        # --dry-run stops before actually pushing to the registry.
        # workspace:* deps are resolved to version numbers before packaging.
        run: pnpm publish -r --filter='./packages/*' --no-git-checks --dry-run

  # ---------------------------------------------------------------------------
  # web-next — consumer E2E (proves the composability loop externally)
  # ---------------------------------------------------------------------------
  web-next-consumer-e2e:
    name: "web-next: Consumer E2E"
    needs: changes
    if: needs.changes.outputs.web_next == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-next/pnpm-lock.yaml

      - name: Install workspace dependencies
        working-directory: web-next
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        working-directory: web-next
        run: pnpm -r --filter='./packages/*' build

      - name: Pack all @niuulabs/* packages
        # pnpm pack converts workspace:* → resolved version numbers in the tarball.
        # All tarballs land in web-next/.packed/ so the install step can glob them.
        run: |
          PACK_DIR="$GITHUB_WORKSPACE/web-next/.packed"
          mkdir -p "$PACK_DIR"
          for pkg_dir in web-next/packages/*/; do
            (cd "$pkg_dir" && pnpm pack --pack-destination "$PACK_DIR")
          done
          echo "Packed tarballs:"
          ls -1 "$PACK_DIR"

      - name: Install consumer app from local tarballs
        # Install ALL niuulabs tarballs in one npm install so inter-package deps
        # (plugin-tyr → plugin-sdk, etc.) resolve from the local tarballs rather
        # than the registry (where 0.0.1 does not yet exist).
        working-directory: web-next/consumer-app
        run: |
          PACK_DIR="$GITHUB_WORKSPACE/web-next/.packed"
          npm install $(ls "$PACK_DIR"/*.tgz | tr '\n' ' ')

      - name: Install Playwright browsers
        working-directory: web-next/consumer-app
        run: npx playwright install --with-deps chromium

      - name: Run consumer Playwright tests
        working-directory: web-next/consumer-app
        run: npx playwright test

      - name: Upload consumer Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: consumer-playwright-report
          path: web-next/consumer-app/playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Helm lint — full tier only. Delegated to reusable workflow.
  # ---------------------------------------------------------------------------
  helm-lint:
    name: Helm Lint
    needs: changes
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.helm == 'true'
    uses: ./.github/workflows/reusable-helm-lint.yaml

  # ---------------------------------------------------------------------------
  # Helm — smoke test (kind cluster) — full tier only
  # ---------------------------------------------------------------------------
  helm-smoke-test:
    name: "Helm: Smoke Test"
    needs: [changes, containers]
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        run: |
          HELM_VERSION="3.14.0"
          curl -sSfL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          echo "f43e1c3387de24547506ab05d24e5309c0ce0b228c23bd8aa64e9ec4b8206651  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp
          mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: ci-test

      - name: Install Postgres in cluster
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm install pg bitnami/postgresql \
            --set auth.postgresPassword=test \
            --set auth.database=volundr \
            --set primary.persistence.enabled=false \
            --set primary.initdb.scripts."init\.sql"="CREATE DATABASE tyr;" \
            --wait --timeout 120s

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load PR container images into kind
        run: |
          PR_TAG="pr-${{ github.event.number }}"
          for CONTAINER in volundr tyr skuld; do
            IMAGE="ghcr.io/${{ github.repository_owner }}/${CONTAINER}:${PR_TAG}"
            if docker pull "${IMAGE}"; then
              kind load docker-image "${IMAGE}" --name ci-test
            else
              echo "::warning::Could not pull ${IMAGE} — chart will use image pull from registry"
            fi
          done

      - name: Install Volundr chart
        run: |
          helm install volundr charts/volundr/ \
            -f charts/volundr/ci-values.yaml \
            --set image.tag="pr-${{ github.event.number }}" \
            --wait --timeout 120s

      - name: Install Tyr chart
        run: |
          helm install tyr charts/tyr/ \
            -f charts/tyr/ci-values.yaml \
            --set image.tag="pr-${{ github.event.number }}" \
            --wait --timeout 120s

      - name: Install Skuld chart
        run: |
          helm install skuld charts/skuld/ \
            -f charts/skuld/ci-values.yaml \
            --set image.tag="pr-${{ github.event.number }}" \
            --wait --timeout 120s

      - name: Verify Volundr pods are ready
        run: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=volundr --timeout=60s

      - name: Verify Tyr pods are ready
        run: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=tyr --timeout=60s

      - name: Verify Skuld pods are ready
        run: kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=skuld --timeout=60s

      - name: Health check Volundr
        run: |
          kubectl port-forward svc/volundr 8080:80 &
          PF_PID=$!
          sleep 3
          curl -sf http://localhost:8080/health
          kill $PF_PID || true

      - name: Health check Tyr
        run: |
          kubectl port-forward svc/tyr 8081:80 &
          PF_PID=$!
          sleep 3
          curl -sf http://localhost:8081/health
          kill $PF_PID || true

      - name: Verify Kubernetes resources
        run: |
          echo "--- ConfigMaps ---"
          kubectl get configmaps -l app.kubernetes.io/managed-by=Helm
          echo "--- Secrets ---"
          kubectl get secrets -l app.kubernetes.io/managed-by=Helm
          echo "--- ServiceAccounts ---"
          kubectl get serviceaccounts -l app.kubernetes.io/managed-by=Helm
          echo "--- Services ---"
          kubectl get services
          echo "--- Pods ---"
          kubectl get pods -o wide

      - name: Dump pod logs on failure
        if: failure()
        run: |
          echo "=== Volundr logs ==="
          kubectl logs -l app.kubernetes.io/name=volundr --tail=50 || true
          echo "=== Tyr logs ==="
          kubectl logs -l app.kubernetes.io/name=tyr --tail=50 || true
          echo "=== Skuld logs ==="
          kubectl logs -l app.kubernetes.io/name=skuld --all-containers --tail=50 || true
          echo "=== Events ==="
          kubectl get events --sort-by=.lastTimestamp | tail -30 || true

  # ---------------------------------------------------------------------------
  # Containers — full tier only. PR builds are amd64-only to keep the
  # critical path short; arm64 is built on push-to-dev/main (see dev.yaml).
  # ---------------------------------------------------------------------------
  containers:
    name: Containers
    needs: changes
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.has_containers == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-container-build.yaml
    with:
      containers: ${{ needs.changes.outputs.container-names }}
      platforms: '["amd64"]'
      tag-prefix: pr-${{ github.event.number }}
      manifest-tags: "pr-${{ github.event.number }} pr-${{ github.event.number }}-${{ github.sha }}"
      labels: |
        dev.volundr.pr=${{ github.event.number }}
        dev.volundr.ephemeral=true

  # ---------------------------------------------------------------------------
  # Helm charts — PR versions — full tier only
  # ---------------------------------------------------------------------------
  build-charts:
    name: Build Helm Charts
    needs: changes
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Helm
        run: |
          HELM_VERSION="3.14.0"
          curl -sSfL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tar.gz
          echo "f43e1c3387de24547506ab05d24e5309c0ce0b228c23bd8aa64e9ec4b8206651  /tmp/helm.tar.gz" | sha256sum -c -
          tar -xzf /tmp/helm.tar.gz -C /tmp
          mv /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Update chart versions
        run: |
          VERSION="0.0.0-pr.${{ github.event.number }}"

          sed -i "s/^version:.*/version: $VERSION/" charts/skuld/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/skuld/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/volundr/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/volundr/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/tyr/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/tyr/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/niuu-shared/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/niuu-shared/Chart.yaml

          sed -i "s/^version:.*/version: $VERSION/" charts/niuu/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/niuu/Chart.yaml

      - name: Package Helm charts
        run: |
          helm package charts/skuld -d .helm-packages/
          helm package charts/volundr -d .helm-packages/
          helm package charts/tyr -d .helm-packages/
          helm package charts/niuu-shared -d .helm-packages/
          helm dependency build charts/niuu
          helm package charts/niuu -d .helm-packages/

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm charts to OCI registry
        run: |
          helm push .helm-packages/skuld-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push .helm-packages/volundr-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push .helm-packages/tyr-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push .helm-packages/niuu-shared-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
          helm push .helm-packages/niuu-0*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  # ---------------------------------------------------------------------------
  # Security — container vulnerability scanning — full tier only.
  # Delegated to reusable workflow.
  # ---------------------------------------------------------------------------
  scan:
    name: Scan
    needs: [changes, containers]
    if: needs.changes.outputs.tier == 'full' && needs.changes.outputs.has_containers == 'true'
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: ./.github/workflows/reusable-container-scan.yaml
    with:
      containers: ${{ needs.changes.outputs.container-names }}
      tag: pr-${{ github.event.number }}

  # ---------------------------------------------------------------------------
  # Security (always runs)
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
