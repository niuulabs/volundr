apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir-ui
  namespace: valhalla
  labels:
    app: mimir-ui
    component: ui
    rune: "ᛗ"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mimir-ui
  template:
    metadata:
      labels:
        app: mimir-ui
        component: ui
    spec:
      containers:
        - name: mimir-ui
          image: ghcr.io/niuulabs/mimir-ui:latest
          ports:
            - containerPort: 80
              name: http
          env:
            - name: MIMIR_BACKEND_URL
              value: "http://ravn.valhalla.svc:7477"
            - name: VITE_MIMIR_INSTANCES
              value: '[{"name":"local","url":"http://ravn.valhalla.svc:7477/mimir","role":"local","writeEnabled":true}]'
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mimir-ui
  namespace: valhalla
  labels:
    app: mimir-ui
spec:
  selector:
    app: mimir-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
