# ~/.ravn/tui.yaml — Ravn TUI configuration
#
# Copy this file to ~/.ravn/tui.yaml and edit to taste.
# The TUI will pick it up automatically on next launch.
# Hot-reload at runtime with :keybindings reload

keybindings:
  # Editor to import keybindings from.
  # Options: vim | nvim | emacs | none
  # default: vim
  #
  # "vim"  — parses $MYVIMRC, ~/.vimrc, ~/.vim/vimrc
  #          Falls back to ~/.config/nvim/init.lua if no vimrc found.
  # "nvim" — parses ~/.config/nvim/init.lua (or init.vim)
  # "emacs"— parses ~/.emacs, ~/.emacs.d/init.el (evil-mode + global-set-key)
  # "none" — built-in vim defaults only, no editor config parsed
  source: vim

  # Explicit path to your editor config (optional — overrides auto-detection)
  # config_path: ~/.config/nvim/init.lua

  # Always-win overrides: applied last, supersede everything including parsed config.
  # Keys use Textual notation: ctrl+x, alt+x, shift+x, or a single character.
  overrides: {}
  # Example: if your terminal intercepts ctrl+h, remap to alt+h instead:
  # overrides:
  #   alt+h: focus_left
  #   alt+j: focus_down
  #   alt+k: focus_up
  #   alt+l: focus_right

  # Textual key names to suppress entirely (even if present in editor config).
  disabled: []
  # Example: prevent ctrl+c from being captured:
  # disabled:
  #   - ctrl+c

# All TUI actions and their default key sequences:
#
#   split_vert       ctrl+w v
#   split_horiz      ctrl+w s
#   close_pane       ctrl+w q
#   focus_next       ctrl+w w
#   focus_left       ctrl+w h
#   focus_down       ctrl+w j
#   focus_up         ctrl+w k
#   focus_right      ctrl+w l
#   move_far_left    ctrl+w H
#   move_far_down    ctrl+w J
#   move_far_up      ctrl+w K
#   move_far_right   ctrl+w L
#   swap_pane        ctrl+w x
#   equalise_panes   ctrl+w =
#   zoom_pane        ctrl+w z   (also: z)
#   resize_left      ctrl+w <
#   resize_right     ctrl+w >
#   resize_up        ctrl+w +
#   resize_down      ctrl+w -
#   rotate_pane      ctrl+w r
#   scroll_top       g g
#   scroll_bottom    G
#   scroll_down      j
#   scroll_up        k
#   search           /
#   command_mode     :
#   quit             q
#   broadcast        b
#   notifications    n
#   view_flokk      f  (assign current pane to Flokk view)
#   view_events      e  (assign current pane to Events view)
#   view_mimir       m  (assign current pane to Mímir view)
#   view_tasks       t  (assign current pane to Tasks view)
#   focus_next       tab
#
# Common vim remaps that the TUI will pick up automatically:
#   nnoremap <C-h> <C-w>h   →  ctrl+h = focus_left
#   nnoremap <C-j> <C-w>j   →  ctrl+j = focus_down
#   nnoremap <C-k> <C-w>k   →  ctrl+k = focus_up
#   nnoremap <C-l> <C-w>l   →  ctrl+l = focus_right
