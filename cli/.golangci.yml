version: "2"

run:
  go: "1.25"

formatters:
  enable:
    - goimports

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - godot
    - gosec
    - makezero
    - misspell
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - usestdlibvars
    - whitespace
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    godot:
      scope: toplevel
      capital: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: unexported-return
        - name: var-naming
  exclusions:
    rules:
      - linters: [noctx]
        path: _test\.go
      - linters: [gosec]
        path: _test\.go
      - linters: [errcheck]
        path: _test\.go
      - linters: [bodyclose]
        path: _test\.go
      - linters: [gocritic]
        path: _test\.go
      - linters: [revive]
        path: _test\.go
      - linters: [godot]
        path: _test\.go
      - linters: [staticcheck]
        path: _test\.go
      - linters: [usestdlibvars]
        path: _test\.go
      - linters: [unparam]
        path: _test\.go
      - linters: [goimports]
        path: _test\.go
    paths:
      - internal/web/dist
